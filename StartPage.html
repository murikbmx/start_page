/* enter/exit group move */
function enterGroupMoveMode(groupNode){
  if(isGroupMoveMode) return;
  if(!groupNode || !groupPopupNode || currentGroupOpen !== groupNode) return;
  isGroupMoveMode = true;
  groupMoveTarget = groupNode;
  groupMoveSnapshot = takeGroupSnapshot(groupNode);
  groupMoveDeleted = [];
  const subs = Array.from(groupPopupNode.querySelectorAll('.subtile'));
  subs.forEach(s=>{
    try{ addDeleteXToSub(s, groupNode); }catch(e){}
    try{ enableDragForSubtile(s, groupNode); }catch(e){}
  });
  createGroupMoveControls();
}

function exitGroupMoveMode(commit = true){
  if(!isGroupMoveMode) return;
  if(groupPopupNode && groupMoveTarget){
    const subs = Array.from(groupPopupNode.querySelector('.subtile'));
    // remove handlers from subs
    subs.forEach(s=>{
      try{ removeDeleteXFromSub(s); }catch(e){}
      try{ disableDragForSubtile(s); }catch(e){}
    });

    if(commit){
      // Commit: take current ordering from popup grid (children) and write into group storage and save.
      const children = Array.from(groupPopupNode.querySelector('.grid').children);
      const newItems = [];
      children.forEach(ch=>{
        if(ch._meta) newItems.push({ name: ch._meta.name, url: ch._meta.url, icon: ch._meta.icon });
        else { const lname = ch.querySelector('.tile-label')?.textContent || ''; const limg = ch.querySelector('img')?.src || ''; const lurl = ch._meta && ch._meta.url ? ch._meta.url : ''; newItems.push({ name: lname, url: lurl, icon: limg }); }
      });
      // Also ensure internal container cleared/recreated to match newItems
      setGroupItems(groupMoveTarget, newItems);
      // recreate internal container DOM nodes for group's container
      if(groupMoveTarget._container){
        while(groupMoveTarget._container.firstChild) groupMoveTarget._container.removeChild(groupMoveTarget._container.firstChild);
        newItems.forEach(it => {
          try{
            const nnode = document.createElement('div'); // lightweight placeholder if needed
            // We keep storage in dataset; main UI uses popup for edit, so internal DOM can be simple
            // No need to append heavy DOM here
          }catch(e){}
        });
      }
      renderGroupPreview(groupMoveTarget);
      saveAll();
    } else {
      // Cancel: restore from snapshot without closing popup; this avoids losing popup position and reflows.
      setGroupItems(groupMoveTarget, Array.isArray(groupMoveSnapshot) ? groupMoveSnapshot.slice() : []);
      renderGroupPopupContent(groupMoveTarget);
      renderGroupPreview(groupMoveTarget);
      // clear any temporary deleted list
      groupMoveDeleted = [];
    }
  }
  destroyGroupMoveControls();
  groupMoveSnapshot = null; groupMoveTarget = null; isGroupMoveMode = false;
}

/* ===== Dragging: pointer + touch/mouse fallback for main tiles ===== */

function enableDragForTile(tile){
  const handle = tile.querySelector('.tile-button') || tile;
  // default touch-action set in CSS to pan-y; set none only when enabling drag
  handle.style.touchAction = 'none';

  function clearHoldTimer(){ if(holdTimer){ clearTimeout(holdTimer); holdTimer=null; } }

  function startDragFromEvent(clientX, clientY, pointerId){
    const contRect = tiles.getBoundingClientRect();
    activeDrag = {
      tile,
      offsetX: clientX - (tile.getBoundingClientRect().left),
      offsetY: clientY - (tile.getBoundingClientRect().top),
      pointerId: pointerId || null
    };
    try{ tile.setPointerCapture && tile.setPointerCapture(pointerId); }catch(err){}
    tile.classList.add('dragging');
    if(!flowOrder.includes(tile)) buildFlowOrder();
  }

  function onPointerDown(e){
    if(!isMoveMode) return;
    e.preventDefault();
    clearHoldTimer();
    holdTimer = setTimeout(()=> startDragFromEvent(e.clientX, e.clientY, e.pointerId), 120);
    window.addEventListener('pointermove', onPointerMove, {passive:false});
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('pointercancel', onPointerUp);
  }

  function onPointerMove(e){
    if(!activeDrag || activeDrag.tile !== tile) return;
    if(e.pointerId !== undefined && activeDrag.pointerId && e.pointerId !== activeDrag.pointerId) return;
    e.preventDefault();
    const contRect = tiles.getBoundingClientRect();
    const newLeft = e.clientX - contRect.left - activeDrag.offsetX;
    const newTop = e.clientY - contRect.top - activeDrag.offsetY;
    tile.style.left = Math.max(0, Math.round(newLeft)) + 'px';
    tile.style.top = Math.max(0, Math.round(newTop)) + 'px';

    const idx = getTargetIndexFromPoint(e.clientX, e.clientY, tile);
    if(idx !== placeholderIndex){
      placeholderIndex = idx;
      applyFlowReorderWhenDragging(tile, idx);
    }
  }

  function onPointerUp(e){
    clearHoldTimer();
    if(activeDrag && activeDrag.tile === tile){
      const clientX = e && e.clientX !== undefined ? e.clientX : (tile.getBoundingClientRect().left + tile.offsetWidth/2);
      const clientY = e && e.clientY !== undefined ? e.clientY : (tile.getBoundingClientRect().top + tile.offsetHeight/2);
      const idx = getTargetIndexFromPoint(clientX, clientY, tile);
      applyFlowReorderWhenDragging(tile, idx);

      try{ tile.releasePointerCapture && tile.releasePointerCapture(activeDrag.pointerId); }catch(err){}
      tile.classList.remove('dragging');
      placeholderIndex = -1;
      tiles.querySelectorAll('.tile').forEach(n => n.classList.remove('drop-target'));
      updateFlowPositions(true);
      activeDrag = null;
    }
    window.removeEventListener('pointermove', onPointerMove);
    window.removeEventListener('pointerup', onPointerUp);
    window.removeEventListener('pointercancel', onPointerUp);
  }

  // mouse/touch fallback
  function onMouseDown(e){
    if(!isMoveMode) return;
    e.preventDefault();
    clearHoldTimer();
    holdTimer = setTimeout(()=>{ startDragFromEvent(e.clientX, e.clientY, null); }, 120);
    function mm(ev){
      if(activeDrag && activeDrag.tile===tile){
        const contRect = tiles.getBoundingClientRect();
        const newLeft = ev.clientX - contRect.left - activeDrag.offsetX;
        const newTop = ev.clientY - contRect.top - activeDrag.offsetY;
        tile.style.left = Math.max(0, Math.round(newLeft)) + 'px';
        tile.style.top = Math.max(0, Math.round(newTop)) + 'px';
        const idx = getTargetIndexFromPoint(ev.clientX, ev.clientY, tile);
        if(idx !== placeholderIndex){
          placeholderIndex = idx;
          applyFlowReorderWhenDragging(tile, idx);
        }
      }
    }
    function mu(ev){
      clearHoldTimer();
      if(activeDrag && activeDrag.tile===tile){
        const idx = getTargetIndexFromPoint(ev.clientX, ev.clientY, tile);
        applyFlowReorderWhenDragging(tile, idx);

        tile.classList.remove('dragging');
        placeholderIndex = -1;
        tiles.querySelectorAll('.tile').forEach(n => n.classList.remove('drop-target'));
        updateFlowPositions(true);
        activeDrag=null;
      }
      window.removeEventListener('mousemove', mm);
      window.removeEventListener('mouseup', mu);
    }
    window.addEventListener('mousemove', mm);
    window.addEventListener('mouseup', mu);
  }

  function onTouchStart(e){
    if(!isMoveMode) return;
    clearHoldTimer();
    const t = e.touches[0];
    holdTimer = setTimeout(()=>{ startDragFromEvent(t.clientX, t.clientY, null); }, 120);
  }

  function onTouchMove(e){
    if(!activeDrag) return;
    const t = e.touches[0];
    const contRect = tiles.getBoundingClientRect();
    const newLeft = t.clientX - contRect.left - activeDrag.offsetX;
    const newTop = t.clientY - contRect.top - activeDrag.offsetY;
    tile.style.left = Math.max(0, Math.round(newLeft)) + 'px';
    tile.style.top = Math.max(0, Math.round(newTop)) + 'px';
    const idx = getTargetIndexFromPoint(t.clientX, t.clientY, tile);
    if(idx !== placeholderIndex){
      placeholderIndex = idx;
      applyFlowReorderWhenDragging(tile, idx);
    }
    e.preventDefault();
  }

  function onTouchEnd(e){
    clearHoldTimer();
    if(activeDrag){
      let clientX = tile.getBoundingClientRect().left + tile.offsetWidth/2;
      let clientY = tile.getBoundingClientRect().top + tile.offsetHeight/2;
      if(e && e.changedTouches && e.changedTouches[0]){
        clientX = e.changedTouches[0].clientX;
        clientY = e.changedTouches[0].clientY;
      }
      const idx = getTargetIndexFromPoint(clientX, clientY, tile);
      applyFlowReorderWhenDragging(tile, idx);

      tile.classList.remove('dragging');
      placeholderIndex = -1;
      tiles.querySelectorAll('.tile').forEach(n => n.classList.remove('drop-target'));
      updateFlowPositions(true);
      activeDrag=null;
    }
  }

  tile._dragHandlers = { onPointerDown, onPointerMove, onPointerUp, onMouseDown, onTouchStart, onTouchMove, onTouchEnd };

  if(window.PointerEvent){
    handle.addEventListener('pointerdown', onPointerDown);
  } else {
    handle.addEventListener('mousedown', onMouseDown);
    handle.addEventListener('touchstart', onTouchStart, {passive:false});
    handle.addEventListener('touchmove', onTouchMove, {passive:false});
    handle.addEventListener('touchend', onTouchEnd, {passive:true});
  }

  handle.addEventListener('click', function(e){ if(isMoveMode){ e.stopPropagation(); e.preventDefault(); } });
}

function disableDragForTile(tile){
  const handle = tile.querySelector('.tile-button') || tile;
  const h = tile._dragHandlers;
  if(!h) return;
  try{
    if(window.PointerEvent){
      handle.removeEventListener('pointerdown', h.onPointerDown);
      window.removeEventListener('pointermove', h.onPointerMove);
      window.removeEventListener('pointerup', h.onPointerUp);
      window.removeEventListener('pointercancel', h.onPointerUp);
    } else {
      handle.removeEventListener('mousedown', h.onMouseDown);
      handle.removeEventListener('touchstart', h.onTouchStart);
      handle.removeEventListener('touchmove', h.onTouchMove);
      handle.removeEventListener('touchend', h.onTouchEnd);
    }
  } catch(e){}
  // restore default touch-action so scrolling works
  try{ handle.style.touchAction = ''; }catch(e){}
  tile._dragHandlers = null;
}

function clearAllHoldTimers(){ if(holdTimer){ clearTimeout(holdTimer); holdTimer=null; } }

/* ===== New: Import URLs from .html/.txt into main or specific group =====
   - If groupNode is null => append to main tiles
   - If groupNode provided => append into that group.
   Parsing:
     - If file is HTML: use DOMParser to collect <a href="...">text</a>
     - If plain text: find urls via regex per-line
*/

/* ===== Надёжный последовательный импорт (замени функцию importUrlsFromFile полностью) ===== */
async function importUrlsFromFile(groupNode = null){
  function normalizeHref(href){
    if(!href) return '';
    try{ return (new URL(href, document.baseURI)).href; }catch(e){ return String(href).trim(); }
  }

  try{
    let content = null;
    if(window.showOpenFilePicker){
      try{
        const handles = await window.showOpenFilePicker({
          types: [{ description: 'HTML or TXT', accept: { 'text/html': ['.html','.htm'], 'text/plain': ['.txt'] } }],
          multiple:false
        });
        if(handles && handles[0]){
          const file = await handles[0].getFile();
          content = await file.text();
        }
      }catch(e){}
    }
    if(!content){
      htmlImportInput.value = '';
      htmlImportInput.click();
      content = await new Promise((res, rej)=>{
        htmlImportInput.onchange = async ()=>{
          const f = htmlImportInput.files && htmlImportInput.files[0];
          if(!f){ res(null); return; }
          try{ const t = await f.text(); res(t); }catch(er){ rej(er); }
        };
      });
    }
    if(!content) return;
    const trimmed = content.trim();
    // если HTML — парсим
    if(/<[a-z][\s\S]*>/i.test(trimmed)){
      const parser = new DOMParser();
      const doc = parser.parseFromString(content, 'text/html');

      const parsedUngrouped = []; // main page links
      const parsedGroups = [];    // {name, items:[{name,url}]}

      // проходим ПОСЛЕДОВАТЕЛЬНО по дочерним элементам body — это даёт корректный порядок
      const children = Array.from(doc.body.children || []);
      for(let i = 0; i < children.length; i++){
        const el = children[i];

        // 1) explicit group section
        if(el.tagName.toLowerCase() === 'section' && el.classList.contains('group')){
          const name = el.getAttribute('data-name') || (el.querySelector('h1,h2,h3,h4,h5,h6') && el.querySelector('h1,h2,h3,h4,h5,h6').textContent.trim()) || 'Группа';
          const anchors = Array.from(el.querySelectorAll('a[href]')).map(a => ({ name: (a.textContent||a.getAttribute('title')||a.href).trim(), url: normalizeHref(a.getAttribute('href')) }));
          parsedGroups.push({ name, items: anchors });
          continue;
        }

        // 2) explicit ungrouped section
        if(el.tagName.toLowerCase() === 'section' && el.classList.contains('ungrouped')){
          const anchors = Array.from(el.querySelectorAll('a[href]')).map(a => ({ name: (a.textContent||a.href).trim(), url: normalizeHref(a.getAttribute('href')) }));
          anchors.forEach(a => parsedUngrouped.push(a));
          continue;
        }

        // 3) heading + following ul/ol => group
        if(/^H[1-6]$/.test(el.tagName)){
          const groupName = el.textContent.trim() || 'Группа';
          // посмотрим следующий элемент(ы) — если ul/ol, соберём
          let j = i + 1;
          const items = [];
          while(j < children.length && !/^H[1-6]$/.test(children[j].tagName)){
            const cand = children[j];
            if(cand.tagName === 'UL' || cand.tagName === 'OL'){
              Array.from(cand.querySelectorAll('a[href]')).forEach(a => items.push({ name: (a.textContent||a.href).trim(), url: normalizeHref(a.getAttribute('href')) }));
            } else {
              // также допускаем ссылки внутри параграфов и т.п.
              Array.from(cand.querySelectorAll && cand.querySelectorAll('a[href]') || []).forEach(a=> items.push({ name:(a.textContent||a.href).trim(), url: normalizeHref(a.getAttribute('href')) }));
            }
            j++;
          }
          if(items.length){
            parsedGroups.push({ name: groupName, items });
            // продвинем i до j-1 (следующая итерация начнёт с j)
            i = j - 1;
            continue;
          }
        }

        // 4) для любых других элементов — возьмём все <a> внутри и добавим в ungrouped
        Array.from(el.querySelectorAll && el.querySelectorAll('a[href]') || []).forEach(a=>{
          parsedUngrouped.push({ name:(a.textContent||a.href).trim(), url: normalizeHref(a.getAttribute('href')) });
        });
      } // end for children

      console.info('IMPORT PARSE:', 'groups=', parsedGroups.length, 'ungrouped=', parsedUngrouped.length);

      // если импортируем в конкретную группу — объединяем всё и кладём в неё
      if(groupNode){
        const combined = parsedUngrouped.concat(parsedGroups.flatMap(g => g.items));
        if(combined.length === 0){ alert('Не найдено ссылок для импорта в группу.'); return; }
        if(!confirm('Импортировать ' + combined.length + ' ссылок в группу "'+ (groupNode._groupName||'Группа') + '"?')) return;
        for(const it of combined){
          try{
            let url = it.url || '';
            if(!/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(url)) url = (url.startsWith('www.') ? 'https://' + url : url);
            createTile(it.name || url, url, (function(){ try{ return 'https://www.google.com/s2/favicons?sz=128&domain=' + (new URL(url)).hostname; }catch(e){ return ''; } })(), groupNode);
          }catch(e){}
        }
        if(currentGroupOpen === groupNode && groupPopupNode){ renderGroupPopupContent(groupNode); renderGroupPreview(groupNode); }
        saveAll();
        alert('Импорт в группу завершён: добавлено ' + combined.length + ' элементов.');
        return;
      }

      // импорт на страницу: спросим заменить или добавить
      const replace = confirm('Найдено ' + parsedGroups.length + ' групп и ' + parsedUngrouped.length + ' одиночных ссылок.\nOK — заменить текущие, Cancel — добавить.');
      if(replace){
        const existing = Array.from(tiles.querySelectorAll('.tile'));
        existing.forEach(n => { if(n !== addTile) n.remove(); });
      }

      // создаём сначала одиночные плитки
      parsedUngrouped.forEach(u=>{
        try{
          let url = u.url || '';
          if(!/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(url)) url = (url.startsWith('www.') ? 'https://' + url : url);
          createTile(u.name || url, url, (function(){ try{ return 'https://www.google.com/s2/favicons?sz=128&domain=' + (new URL(url)).hostname; }catch(e){ return ''; } })());
        }catch(e){}
      });

      // потом создаём группы
      parsedGroups.forEach(g=>{
        try{
          const grp = createGroup(g.name || 'Группа');
          const items = (g.items || []).map(it=>{
            let url = it.url || '';
            if(!/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(url)) url = (url.startsWith('www.') ? 'https://' + url : url);
            return { name: it.name || url, url };
          });
          const itemsWithIcons = items.map(it => ({ name: it.name, url: it.url, icon: (function(){ try{ return 'https://www.google.com/s2/favicons?sz=128&domain=' + (new URL(it.url)).hostname; }catch(e){ return ''; } })() }));
          setGroupItems(grp, itemsWithIcons);
          renderGroupPreview(grp);
        }catch(e){}
      });

      saveAll();
      alert('Импорт завершён: ' + parsedGroups.length + ' групп и ' + parsedUngrouped.length + ' одиночных ссылок обработано.');
      return;
    }

    // fallback: plain text (как раньше)
    const urlRegex = /((https?:\/\/|www\.)[^\s"'<>\)\]]+)/ig;
    const lines = content.split(/\r?\n/);
    const list = [];
    lines.forEach(ln=>{
      const m = ln.match(urlRegex);
      if(m){
        m.forEach(u=>{
          let url = u.trim();
          if(!/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(url)) url = (url.startsWith('www.') ? 'https://' + url : 'https://' + url);
          list.push({ name: url, url });
        });
      } else {
        const t = ln.trim();
        if(t && /\w+\.\w{2,}/.test(t)) {
          let url = t;
          if(!/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(url)) url = 'https://' + url;
          list.push({ name: t, url });
        }
      }
    });

    if(list.length === 0){ alert('Не найдено ссылок в файле.'); return; }

    if(groupNode){
      if(!confirm('Импортировать ' + list.length + ' ссылок в группу "'+ (groupNode._groupName||'Группа') + '"?')) return;
      for(const it of list){ try{ createTile(it.name, it.url, ('https://www.google.com/s2/favicons?sz=128&domain=' + (new URL(it.url)).hostname), groupNode); }catch(e){} }
      if(currentGroupOpen === groupNode && groupPopupNode){ renderGroupPopupContent(groupNode); renderGroupPreview(groupNode); }
      saveAll();
      alert('Импорт завершён: добавлено ' + list.length + ' элементов.');
      return;
    }

    if(!confirm('Импортировать ' + list.length + ' ссылок на страницу?')) return;
    for(const it of list){ try{ createTile(it.name, it.url, ('https://www.google.com/s2/favicons?sz=128&domain=' + (new URL(it.url)).hostname)); }catch(e){} }
    saveAll();
    alert('Импорт завершён: добавлено ' + list.length + ' элементов.');
  }catch(e){
    console.error('importUrlsFromFile error (sequential):', e);
    alert('Ошибка импорта: ' + (e && e.message ? e.message : 'ошибка'));
  }
}

/* Modal to edit subtile inside group */
function showEditGroupItemModal(subNode){
  if(!subNode || !currentGroupOpen) return;
  modalMode = 'groupItem';
  currentEditGroupItem = { group: currentGroupOpen, subNode: subNode, index: null };
  const grid = groupPopupNode && groupPopupNode.querySelector('.grid');
  const idx = grid ? Array.from(grid.children).indexOf(subNode) : -1;
  currentEditGroupItem.index = idx;
  siteName.placeholder = 'Название';
  siteUrl.placeholder = 'Адрес (например example.com)';
  siteName.value = subNode._meta && subNode._meta.name ? subNode._meta.name : '';
  siteUrl.value = subNode._meta && subNode._meta.url ? subNode._meta.url : '';
  stagedIconData = subNode._meta && subNode._meta.icon ? subNode._meta.icon : '';
  iconUrlInput.value = stagedIconData || '';
  renderIconPreview(stagedIconData || null);
  modalBackdrop.style.display='flex';
  modalBackdrop.style.pointerEvents='auto';
  modalBackdrop.setAttribute('aria-hidden','false');
  setTimeout(()=>siteName.focus(),50);

  saveAdd.onclick = ()=>{
    const name = siteName.value.trim();
    let url = siteUrl.value.trim();
    if(!name || !url) return;
    if(!/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(url)) url = 'https://' + url;
    let iconToSave = stagedIconData || '';
    try{ const p = new URL(url); if(!iconToSave) iconToSave = 'https://www.google.com/s2/favicons?sz=128&domain=' + p.hostname; }catch(e){}
    const gi = currentEditGroupItem;
    if(gi && gi.group && Array.isArray(getGroupItems(gi.group)) && gi.index>=0){
      const items = getGroupItems(gi.group).slice();
      items[gi.index] = { name, url, icon: iconToSave };
      setGroupItems(gi.group, items);
      gi.subNode._meta = gi.subNode._meta || {};
      gi.subNode._meta.name = name;
      gi.subNode._meta.url = url;
      gi.subNode._meta.icon = iconToSave;
      if(gi.subNode.querySelector('.tile-label')) gi.subNode.querySelector('.tile-label').textContent = name;
      const im = gi.subNode.querySelector('img');
      if(im) im.src = iconToSave || DEFAULT_ICON_DATA_URL;
      renderGroupPreview(gi.group);
      saveAll();
    }
    hideAddModal();
  };
}

function onWindowResize(){
  try{ updateFlowPositions(true); }catch(e){}
  // if popup open, recompute center and size to keep it centered and square
  if(groupPopupNode && currentGroupOpen){
    const margin = 32;
    const maxSide = Math.min(window.innerWidth - margin, window.innerHeight - margin);
    const defaultSide = Math.min(360, maxSide);
    const side = Math.max(240, defaultSide);
    groupPopupNode.style.width = side + 'px';
    groupPopupNode.style.height = side + 'px';
    const left = Math.max(8, Math.round((window.innerWidth - side) / 2));
    const top  = Math.max(8, Math.round((window.innerHeight - side) / 2));
    groupPopupNode.style.left = left + 'px';
    groupPopupNode.style.top = top + 'px';
    // adjust grid row size and columns
    const grid = groupPopupNode.querySelector('.grid');
    if(grid){
      const mainTile = computeMainTileSize();
      grid.style.gridTemplateColumns = `repeat(3, ${mainTile}px)`;
      grid.style.gridAutoRows = mainTile + 'px';
      grid.style.gap = Math.max(8, Math.round(mainTile * 0.08)) + 'px';
    }
    // reposition group move controls if present
    if(groupMoveControls && groupMoveControlsRepositionHandler) groupMoveControlsRepositionHandler();
    // reposition external close
    if(externalGroupCloseRepositionHandler) externalGroupCloseRepositionHandler();
  }
}

  // KEEP: Import links (.html/.txt)
  const btnImportHtml = document.createElement('button');
  btnImportHtml.innerHTML = '<span class="icon">⬇️</span><span>Импорт ссылок (.html)</span>';
  btnImportHtml.addEventListener('click', async (ev)=>{

    await importUrlsFromFile(null); // null -> main page
    closeSettingsMenu();
  });

  // Note: removed JSON import/export menu entries per request

  settingsMenuNode.appendChild(btnBg);
  settingsMenuNode.appendChild(btnResetBg);
  settingsMenuNode.appendChild(btnSearchToggle);
  settingsMenuNode.appendChild(btnExportHtml);
  settingsMenuNode.appendChild(btnImportHtml);

  const stopPropagationFn = (e) => e.stopPropagation();
  settingsMenuNode._stopPropagationFn = stopPropagationFn;
  settingsMenuNode.addEventListener('click', stopPropagationFn);

  contextRoot.appendChild(settingsMenuNode);
  contextRoot.style.pointerEvents = 'auto';

  // Positioning
  const fabRect = settingsFab.getBoundingClientRect();
  const menuW = SETTINGS_MENU_SETTINGS.width;
  let left = fabRect.left + SETTINGS_MENU_SETTINGS.offsetX;
  let top;

  if(SETTINGS_MENU_SETTINGS.prefer === 'below'){
    top = fabRect.bottom + SETTINGS_MENU_SETTINGS.offsetY;
  } else if(SETTINGS_MENU_SETTINGS.prefer === 'center'){
    left = (window.innerWidth - menuW) / 2 + SETTINGS_MENU_SETTINGS.offsetX;
    top = fabRect.bottom + SETTINGS_MENU_SETTINGS.offsetY;
  } else { // default 'above'
    top = fabRect.top - SETTINGS_MENU_SETTINGS.offsetY - 160;
  }

  const rect = settingsMenuNode.getBoundingClientRect();
  const w = rect.width || menuW;
  const h = rect.height || 160;
  if(left + w > window.innerWidth - 8) left = Math.max(8, window.innerWidth - w - 8);
  if(top + h > window.innerHeight - 8) top = Math.max(8, window.innerHeight - h - 8);
  if(left < 8) left = 8;
  if(top < 8) top = 8;

  settingsMenuNode.style.left = left + 'px';
  settingsMenuNode.style.top = top + 'px';

  setTimeout(()=>document.addEventListener('click', onDocClickCloseSettings), 0);

  settingsFab.setAttribute('aria-expanded','true');

  setTimeout(()=>settingsMenuNode && settingsMenuNode.focus(), 50);
}

/* ===== Background picker / handling ===== */

async function pickBackgroundImage(){
  try{
    if(window.showOpenFilePicker){
      try{
        const handles = await window.showOpenFilePicker({
          types: [{
            description: 'Images',
            accept: {'image/*': ['.png','.jpg','.jpeg','.webp','.gif','.bmp','.svg']}
          }],
          multiple:false
        });
        if(handles && handles.length){
          const file = await handles[0].getFile();
          await setBackgroundFromFile(file);
          return;
        }
      }catch(e){}
    }

    if(window.showDirectoryPicker){
      try{
        const dir = await window.showDirectoryPicker();
        for await (const [, entry] of dir){
          if(entry.kind === 'file'){
            const name = entry.name.toLowerCase();
            if(/\.(png|jpe?g|webp|gif|bmp|svg)$/.test(name)){
              const file = await entry.getFile();
              await setBackgroundFromFile(file);
              return;
            }
          }
        }
        alert('В выбранной папке не найдено изображений.');
        return;
      }catch(e){}
    }

    bgFileInput.value = '';
    bgFileInput.click();
    bgFileInput.onchange = async ()=>{
      const f = bgFileInput.files && bgFileInput.files[0];
      if(f) await setBackgroundFromFile(f);
    };
  }catch(err){
    console.error('pickBackgroundImage error', err);
    alert('Не удалось выбрать файл фона: ' + (err && err.message ? err.message : 'ошибка'));
  }
}

async function setBackgroundFromFile(file){
  try{
    const reader = new FileReader();
    const prom = new Promise((res, rej)=>{
      reader.onload = ()=>res(reader.result);
      reader.onerror = ()=>rej(reader.error);
    });
    reader.readAsDataURL(file);
    const dataURL = await prom;
    pageBg.style.backgroundImage = `url('${dataURL}')`;
    pageBg.style.opacity = '1';
    try{ localStorage.setItem(BG_DATA_KEY, JSON.stringify({ name: file.name, data: dataURL })); }catch(e){}
    document.documentElement.style.background = 'none';
  }catch(e){
    console.error('setBackgroundFromFile', e);
    alert('Не удалось установить фон: ' + (e && e.message ? e.message : 'ошибка'));
  }
}

function loadBackgroundFromStorage(){
  try{
    const raw = localStorage.getItem(BG_DATA_KEY);
    if(!raw) return;
    const obj = JSON.parse(raw);
    if(obj && obj.data){
      pageBg.style.backgroundImage = `url('${obj.data}')`;
      pageBg.style.opacity = '1';
      document.documentElement.style.background = 'none';
    }
  }catch(e){}
}

function clearBackground(){
  try{ localStorage.removeItem(BG_DATA_KEY); }catch(e){}
  pageBg.style.backgroundImage = '';
  pageBg.style.opacity = '0';
  document.documentElement.style.background = '';
}
