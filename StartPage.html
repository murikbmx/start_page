<style>
:root{
  --bg:#040405;
  --panel:#0f1012;
  --muted: rgb(255, 255, 255);
  --ok-blue:#2b6ef6;
  --border-light:rgba(255,255,255,0.3);
  --gap:12px;
  --cols:5;
  --tile-gap:10px;
  --radius:12px;
  --font-sans:system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  --max-tile-size:110px;
}
@media (orientation: landscape) and (max-width:1024px){ :root{ --cols:4; --max-tile-size:110px; } }/* базовые стили */ *{box-sizing:border-box;margin:0;padding:0} html,body{height:100%;width:100%;overflow-x:hidden;background:linear-gradient(180deg,#040405 0%,#0b0c0e 100%);-webkit-font-smoothing:antialiased} body{font-family:var(--font-sans);color:#fff;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);display:flex;justify-content:center} .wrapper{width:100%;max-width:1200px;padding:14px} .search-row{display:flex;align-items:center;margin-bottom:14px;padding-inline:6px} .search-box{ flex:1; display:flex; align-items:center; border:2px solid rgba(255,255,255,0.6); padding:4px; border-radius:24px; background:var(--panel); min-height:52px; } .engine-btn, .ok-btn { display:flex; align-items:center; justify-content:center; background:transparent; border:0; padding:0 12px; cursor:pointer; user-select:none; } .engine-btn { flex-shrink: 0; width:44px; height:44px; border-radius:999px; background:#111213; position:relative; overflow:hidden; } .engine-icon{ width:24px; height:24px; display:flex; align-items:center; justify-content:center; } .search-input{ flex:1; border: none; background: transparent; outline: none; color: #fff; font-size: 16px; padding: 8px 6px; min-width: 0; } .ok-btn{ background: var(--ok-blue); color: #fff; padding: 8px 12px; border-radius: 10px; font-weight: 700; flex-shrink: 0; } .divider { width: 1px; background: var(--border-light); height: 60%; margin: 0 4px; }

/* tiles */ .tiles{ display:grid; grid-template-columns:repeat(var(--cols),minmax(0,1fr)); gap:var(--tile-gap); align-items:start; position:relative; transition: height 120ms linear; justify-items:center; touch-action: pan-y; -webkit-overflow-scrolling: touch; } .tile{ display:flex; flex-direction:column; align-items:center; gap:8px; min-height:84px; text-align:center; cursor:pointer; user-select:none; position:relative; max-width: var(--max-tile-size); width:100%; touch-action: pan-y; } .tile-button { width:100%; position:relative; border-radius:12px; background: rgba(15,16,18,0.75); overflow:hidden; border:1px solid rgba(255,255,255,0.08); box-shadow:0 12px 36px rgba(0,0,0,0.6); aspect-ratio:1/1; display:block; touch-action: pan-y; } .tile-button .inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff} .tile-button img { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); max-width: 70%; max-height: 70%; object-fit: contain; border-radius: 8px; }

.group-preview-item img { position: static !important; transform: none !important; left: auto !important; top: auto !important; max-width: 100% !important; max-height: 100% !important; width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important; border-radius: 6px !important; } .tile-label{font-size:13px;color:var(--muted);width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap} .add-tile{min-width:64px} .add-button{ width:100%; aspect-ratio:1/1; border-radius:12px; background: rgba(13,13,13,0.7); display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;border:1px solid rgba(255,255,255,0.03);transform:scale(0.92) }

/* group specific */ .group-button{ background:transparent; border:1px dashed rgba(255,255,255,0.06); } .group-preview-grid{ position:absolute; inset:8px; display:grid; grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(2,1fr); gap:4px; opacity:0.9 } .group-preview-item{ border-radius:6px; overflow:hidden; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.03); font-size:10px; color:#fff }

/* popup: group window layout and pinned controls */

/* ===== Group popup: pinned header near top + scrollable grid below ===== */
/* Подстраиваемые значения — меняй эти числа по вкусу */
:root{
  --group-header-top: 6px;   /* смещение шапки от верхнего края попапа (уменьшай -> ближе к краю) */
  --group-grid-top: 48px;    /* отступ сверху для области grid (должен быть >= высоты шапки) */
}

/* tile-button — убираем статическое блокирование свайпа (если у тебя раньше было touch-action:none) */
.tile-button {
  width:100%;
  position:relative;
  border-radius:12px;
  background: rgba(15,16,18,0.75);
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 12px 36px rgba(0,0,0,0.6);
  aspect-ratio:1/1;
  display:block;
  /* НЕ ставим touch-action: none здесь — это мешает прокрутке свайпом */
}

/* сам попап — немного компактнее padding, чтобы шапка могла быть ближе к верхнему краю */
.group-popup{
  position:fixed;
  z-index:2000;
  background:#1b1b1d;
  border-radius:12px;
  border:2px solid rgba(255,255,255,0.06);
  box-shadow:0 30px 80px rgba(0,0,0,0.8);
  padding:10px;     /* уменьшили padding, чтобы шапка была ближе к верхнему краю */
  overflow:visible; /* grid будет сам прокручиваться */
}

/* header прижат к верхнему краю внутри попапа (значение --group-header-top управляет высотой) */
.group-popup .popup-header{
  position:absolute;
  top: var(--group-header-top);
  left:12px;
  right:12px;
  display:flex;
  align-items:flex-start;   /* прижать кнопки к верхнему краю шапки */
  justify-content:space-between;
  gap:8px;
  z-index:2210;
  background:transparent;
  padding:0;
}

/* заголовок слева — разрешаем перенос слов, чтобы длинный текст не опускал кнопки вниз */
.group-popup .popup-header .title{
  flex:1 1 auto;
  align-self:flex-start;
  white-space:normal;
  word-break:break-word;
  margin-right:8px;
  font-weight:700;
  font-size:16px;
  line-height:1.05;
}

/* контейнер кнопок (Import / +) — компактный и прижатый к верху */
.group-popup .popup-header .actions{
  display:flex;
  align-items:flex-start; /* top-aligned so buttons sit at the very top */
  gap:8px;
}

/* компактные размеры кнопок в шапке */
.group-popup .popup-header .btn,
.group-popup .popup-header .btn.ghost{
  padding:1px 8px;
  font-size:13px;
  line-height:1;
}

/* обёртка для + с подписью "добавить" под кнопкой */
.group-popup .add-wrap {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  justify-content:center;
}
.group-popup .add-wrap .add-label{
  font-size:11px;
  color:var(--muted);
  line-height:1;
}

/* grid занимает остальную часть попапа и скроллится — touch-action позволяет вертик. свайп */
.group-popup .grid{
  position:absolute;
  top: var(--group-grid-top);
  left:12px;
  right:12px;
  bottom:12px;
  overflow:auto;
  -webkit-overflow-scrolling: touch; /* smooth on iOS */
  touch-action: pan-y;               /* allow vertical scrolling even when touching tiles */
  display:grid;
  gap:10px;
  padding-bottom:96px;
  justify-content:center;
}

/* контейнер кнопок в заголовке: горизонтальный ряд, выровнен по центру по высоте */
.group-popup .popup-header .actions{
  display:flex;
  align-items:center;
  gap:10px;
}

/* мелкая модификация для подписи "добавить" под + */
.group-popup .add-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; justify-content:center; }

 allow wrapping of long group titles */
.group-popup .popup-controls{ position:absolute; left:12px; bottom:12px; z-index:2200; display:flex; gap:8px; } 
/* internal close (kept for backward compat but hidden by default) */
.group-popup .popup-close{ position:absolute; right:12px; bottom:12px; z-index:2200; display:none; } 
.group-popup .popup-close .btn{ border:1px solid rgba(255,255,255,0.08); background:transparent; color:#fff; }

/* external close button (placed under popup, right) */
.group-popup-external-close{ position:fixed; z-index:2200; display:flex; align-items:center; justify-content:center; } 
.group-popup-external-close .btn{ padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.08); background:transparent; color:#fff; font-weight:700 }

/* context/menu/modal */ .menu{ position:fixed; background:var(--panel); border-radius:10px; padding:0px; border:1px solid rgba(255,255,255,0.03); box-shadow:0 20px 50px rgba(0,0,0,0.7); min-width:200px; z-index:995; } .menu button{display:flex;align-items:center;width:100%;text-align:left;padding:8px;background:transparent;border:0;color:#fff;border-radius:8px;cursor:pointer;font-size:14px;gap:8px} .menu button:hover{background:#151516} .menu .icon{display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center} .menu .check{margin-left:auto;color:var(--ok-blue);font-size:14px} .modal-backdrop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:3000} .modal{background:var(--panel);border-radius:10px;padding:12px;border:1px solid rgba(255,255,255,0.03);box-shadow:0 20px 50px rgba(0,0,0,0.7);width:92%;max-width:420px} .field{display:flex;flex-direction:column;gap:8px;margin-bottom:8px} .field input{padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:#0d0d0d;color:#fff;outline:0;font-size:15px} .modal-actions{display:flex;gap:8px;justify-content:flex-end} .btn{padding:8px 12px;border-radius:8px;border:0;cursor:pointer;font-weight:700} .btn.ghost{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.03)} .btn.primary{background:var(--ok-blue);color:#fff} .hidden{display:none}

/* small variant for group header buttons */
.group-popup .btn.ghost.small{ background:#6b6b6b; color:#fff; padding:6px 8px; font-size:13px; border:0; border-radius:8px; }
.group-popup .btn.cancel.small{ background:#6b6b6b; color:#fff; padding:6px 8px; font-size:13px; border:0; border-radius:8px; }

/* small label under + */
.group-popup .add-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }

/* move mode visuals */ .move-delete { position:absolute; right:8px; top:8px; width:28px; height:28px; border-radius:6px; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; cursor:pointer; z-index:1200; border:1px solid rgba(255,255,255,0.06); } .move-controls { position: fixed; z-index: 1205; display: flex; gap: 8px; pointer-events: auto; left: 16px; bottom: calc(16px + 100px); } .move-controls .btn { font-weight:800; padding:8px 12px; border-radius:10px; border:0; } .move-controls .btn.cancel { background:transparent; color:var(--muted); border:1px solid rgba(255,255,255,0.03); } .move-controls .btn.ok { background:var(--ok-blue); color:#fff; } .dragging { box-shadow:0 18px 48px rgba(0,0,0,0.75); transform: translateZ(0) scale(1.02); }

/* highlight target tile during drag */ .tile.drop-target .tile-button { outline: 3px solid rgba(43,110,246,0.95); box-shadow: 0 18px 40px rgba(43,110,246,0.12); }

/* transitions */ .tile { transition: left 160ms ease, top 160ms ease, width 120ms ease, height 120ms ease; } .tile.dragging { transition: none !important; }

/* responsive tweaks */ @media (max-width:480px){ .wrapper{ padding:10px; max-width:100%; } .search-row{padding-inline:6px} .engine-btn{width:40px;height:40px} .ok-btn{padding:8px 10px} }

/* page background element (fixed, stays while content scrolls) */ .page-bg{ position:fixed; inset:0; z-index:-1; background-size:cover; background-position:center; background-repeat:no-repeat; background-attachment:fixed; transition:opacity .18s ease, filter .18s ease; pointer-events:none; }

/* settings FAB */ .settings-fab{ position:fixed; right:16px; bottom:16px; z-index:1100; width:56px; height:56px; border-radius:999px; display:flex; align-items:center; justify-content:center; background:#111214; border:1px solid rgba(255,255,255,0.06); box-shadow:0 12px 30px rgba(0,0,0,0.6); cursor:pointer; } .settings-fab:active{ transform: translateY(1px); } .settings-fab svg{ width:24px; height:24px; }

.toggle { margin-left:auto; display:inline-flex; align-items:center; gap:8px; } .switch { width:40px; height:22px; background:#222; border-radius:999px; position:relative; padding:2px; box-sizing:border-box; } .switch .knob{ width:18px; height:18px; border-radius:50%; background:#fff; transition:transform .14s linear; transform: translateX(0); } .switch.on{ background: #2b6ef6; } .switch.on .knob{ transform: translateX(18px); }

.hidden-input{ display:none; } .engine-row { display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.02); } .engine-row .icon{ width:28px; height:28px; border-radius:6px; display:inline-flex; align-items:center; justify-content:center; overflow:hidden; } .engine-row .label { flex:1; } .engine-row .actions { display:flex; gap:8px; align-items:center; } .icon-edit-row{ display:flex; gap:10px; align-items:flex-start; } .icon-preview{ width:64px; height:64px; border-radius:8px; background:rgba(255,255,255,0.03); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; border:1px solid rgba(255,255,255,0.03); } .icon-preview img{ max-width:100%; max-height:100%; object-fit:contain; } .icon-edit-controls{ display:flex; flex-direction:column; gap:8px; flex:1; min-width:0; } .icon-buttons-row{ display:flex; gap:8px; justify-content:flex-start; flex-wrap:wrap; } .icon-buttons-row .btn { padding:8px 10px; font-weight:700; border-radius:8px; } .icon-url-field{ margin-top:4px; } @media (max-width:420px){ .icon-edit-row{ flex-direction:row; gap:8px; align-items:center; } .icon-preview{ width:56px; height:56px; } .icon-buttons-row{ gap:6px; } .modal{ padding:10px; } }

/* === Group popup header buttons: grey bg + white text, compact size === */
.group-popup .popup-header .btn.ghost,
.group-popup .popup-header .btn.ghost.small,
.group-popup .popup-header .add-wrap .btn {
  background: #4a4a4a;        /* серый фон */
  color: #ffffff;             /* белый текст */
  border: 1px solid rgba(255,255,255,0.06);
  padding: 6px 8px;
  font-size: 13px;
  line-height: 1;
  border-radius: 8px;
  box-shadow: none;
  cursor: pointer;
}

/* чуть компактнее для явно маленьких кнопок */
.group-popup .popup-header .btn.ghost.small {
  padding: 5px 7px;
  font-size: 10px;
  border-radius: 7px;
}

/* + кнопка — сделаем чуть крупнее, но с тем же стилем */
.group-popup .popup-header .add-wrap .btn {
  width: 38px;
  height: 10px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  padding:0;
}

/* подпись "добавить" под + */
.group-popup .add-wrap .add-label { color:#fff; opacity:0.9; font-size:11px; }

/* hover / active */
.group-popup .popup-header .btn.ghost:hover,
.group-popup .popup-header .add-wrap .btn:hover {
  filter: brightness(1.08);
}

/* фокусная рамка — на клавиатуре видно */
.group-popup .popup-header .btn.ghost:focus,
.group-popup .popup-header .add-wrap .btn:focus {
  outline: 2px solid rgba(255,255,255,0.12);
  outline-offset: 2px;
}

/* Дополнительный override: "Отмена" и "Удалить все" — такой же серый фон */
.group-popup .btn-cancel,
.group-popup .btn-delete-all,
.group-popup .popup-footer .btn.cancel,
.group-popup .popup-footer .btn.delete-all,
button[data-action="cancel"],
button[data-action="delete-all"],
button.cancel,
button.delete-all,
button[data-role="cancel"],
button[data-role="delete-all"] {
  background: #4a4a4a !important;
  color: #ffffff !important;
  border: 1px solid rgba(255,255,255,0.06) !important;
  padding: 8px 12px !important;
  border-radius: 8px !important;
}

/* Сохраняем тот же стиль при наведении/фокусе */
.group-popup .btn-cancel:hover,
.group-popup .btn-delete-all:hover,
.group-popup .btn-cancel:focus,
.group-popup .btn-delete-all:focus,
button.cancel:hover,
button.delete-all:hover,
button.cancel:focus,
button.delete-all:focus {
  background: #4a4a4a !important;
  color: #ffffff !important;
  opacity: 0.95 !important;
}

/* Гарантированный override: кнопки останутся серыми даже если другие правила переопределяют их во время move-mode */
.group-popup-external-close .btn,
.group-popup .popup-close .btn {
  background: #4a4a4a !important;
  color: #ffffff !important;
  border: 1px solid rgba(255,255,255,0.06) !important;
  padding: 8px 12px !important;
  border-radius: 8px !important;
}
 </style>

<script>

/* ===== helper: compute main tile size, and group items helpers ===== */
function computeMainTileSize(){
  const tileGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--tile-gap')) || 10;
  const cols = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cols'), 10) || 4;
  const contWidth = Math.max(tiles.clientWidth, tiles.getBoundingClientRect().width);
  const totalGap = (cols - 1) * tileGap;
  let tileWidth = Math.max(48, Math.floor((contWidth - totalGap) / cols));
  const maxTileSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--max-tile-size')) || 120;
  tileWidth = Math.min(tileWidth, maxTileSize);
  return tileWidth;
}


function setGroupItems(group, items){
  try{
    group._items = Array.isArray(items) ? items.slice() : [];
    group.dataset.items = JSON.stringify(group._items);
  }catch(e){
    try{ group._items = Array.isArray(items)? items.slice() : []; }catch(e){ group._items = []; }
    try{ group.dataset.items = JSON.stringify(group._items); }catch(e){}
  }

  // небольшой защитный вызов сохранения: сохраняем асинхронно, чтобы избежать рекурсий
  // и чтобы точно записать изменения в localStorage сразу после модификации группы.
  setTimeout(()=>{
    try{
      saveAll();
    }catch(err){
      console.error('Ошибка при saveAll после setGroupItems:', err);
      // если проблема — скорее всего квота localStorage; сообщаем пользователю
      try{
        if(err && (err.name === 'QuotaExceededError' || err.code === 22 || err.code === 1014)){
          alert('Не удалось сохранить изменения: превышен лимит локального хранилища. Уменьши размер иконок или отключи автоматическое встраивание иконок.');
        }
      }catch(e){}
    }
  }, 0);
}
function getGroupItems(group){
  if(Array.isArray(group._items)) return group._items;
  try{
    const ds = group.dataset && group.dataset.items;
    if(ds){
      const parsed = JSON.parse(ds);
      if(Array.isArray(parsed)){ group._items = parsed; return group._items; }
    }
  }catch(e){}
  group._items = [];
  return group._items;
}

/* ===== Позиционирование и ресайз-логика плиток (как раньше) ===== */
function updateFlowPositions(animated = true){
  const tileGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--tile-gap')) || 10;
  const cols = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cols'), 10) || 4;
  const contWidth = Math.max(tiles.clientWidth, tiles.getBoundingClientRect().width);
  const totalGap = (cols - 1) * tileGap;
  let tileWidth = Math.max(48, Math.floor((contWidth - totalGap) / cols)); // минимум 48px
  const maxTileSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--max-tile-size')) || 120;
  tileWidth = Math.min(tileWidth, maxTileSize);

  flowOrder.forEach((n, i) => {
    if(!n) return;
    if(activeDrag && activeDrag.tile === n) return; // тащим — не перезаписываем позицию
    const row = Math.floor(i / cols);
    const col = i % cols;
    n.style.width = tileWidth + 'px';
    n.style.height = tileWidth + 'px';
    n.style.left = (col * (tileWidth + tileGap)) + 'px';
    n.style.top = (row * (tileWidth + tileGap)) + 'px';
    n.style.zIndex = 1000;
  });
  // обновим контейнер по высоте
  const rows = Math.ceil(flowOrder.length / cols) || 1;
  const totalH = rows * tileWidth + (rows - 1) * tileGap;
  tiles.style.minHeight = (totalH + 20) + 'px';
}

/* Возвращаем индекс вставки по позиции указателя */
function getTargetIndexFromPoint(clientX, clientY, excludeTile){
  const contRect = tiles.getBoundingClientRect();
  const cx = clientX - contRect.left;
  const cy = clientY - contRect.top;
  const items = flowOrder.filter(t => t !== excludeTile);
  if(items.length === 0) return 0;

  let minDist = Infinity;
  let nearestIdx = 0;
  for(let i = 0; i < items.length; i++){
    const t = items[i];
    const r = t.getBoundingClientRect();
    const centerX = r.left - contRect.left + r.width / 2;
    const centerY = r.top - contRect.top + r.height / 2;
    const dx = cx - centerX;
    const dy = cy - centerY;
    const d2 = dx*dx + dy*dy;
    if(d2 < minDist){
      minDist = d2;
      nearestIdx = i;
    }
  }

  const nearestRect = items[nearestIdx].getBoundingClientRect();
  const nearestCenterX = nearestRect.left - contRect.left + nearestRect.width / 2;
  if(cx > nearestCenterX) return nearestIdx + 1;
  return nearestIdx;
}

function applyFlowReorderWhenDragging(dragTile, insertIndex){
  const without = flowOrder.filter(n => n !== dragTile);
  without.splice(insertIndex, 0, dragTile);
  flowOrder = without;
  flowOrder.forEach(n => tiles.insertBefore(n, addTile));
  tiles.querySelectorAll('.tile').forEach(n => n.classList.remove('drop-target'));
  const neighbor = flowOrder[insertIndex + 1] || flowOrder[insertIndex - 1] || null;
  if(neighbor && neighbor !== dragTile) neighbor.classList.add('drop-target');
  updateFlowPositions(false);
}

/* helpers */
function isProbablyUrl(val){
  if(!val) return false;
  const t = val.trim();
  if(/\s/.test(t)) return false;
  if(/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(t)) return true;
  return t.includes('.') && !t.startsWith('.') && !t.endsWith('.');
}
function openCurrent(url){
  try {
    if(!/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(url)) url = 'https://' + url;
    const p = new URL(url);
    if(p.protocol === 'javascript:') return;
    window.location.href = p.href;
  } catch(e){ openSearchCurrent(url); }
}
function openSearchCurrent(q){
  const s = encodeURIComponent(q.trim());
  window.location.href = (selectedEngine && selectedEngine.q ? selectedEngine.q : engines[0].q) + s;
}
function navigate(){ const v = omnibox.value.trim(); if(!v) return; if(isProbablyUrl(v)) openCurrent(v); else openSearchCurrent(v); }

/* fetch image and convert to dataURL (best-effort; may fail due to CORS) */
async function fetchImageAsDataURL(url){
  try{
    if(!url) return null;
    // if already data:, return as is
    if(url.startsWith('data:')) return url;
    const resp = await fetch(url, {mode:'cors'});
    if(!resp.ok) return null;
    const blob = await resp.blob();
    // convert blob -> dataURL
    return await new Promise((res)=>{
      const reader = new FileReader();
      reader.onload = ()=>res(reader.result);
      reader.onerror = ()=>res(null);
      reader.readAsDataURL(blob);
    });
  }catch(e){
    return null;
  }
}

/* ensure icon stored as dataURL for offline usage (best-effort) */
async function ensureIconStoredForNode(node){
  try{
    if(!node) return;
    const existing = node._icon || '';
    if(!existing) return;
    if(existing.startsWith('data:')) return; // already embedded
    // try to fetch and convert
    const data = await fetchImageAsDataURL(existing);
    if(data){
      node._icon = data;
      // update DOM img if present
      const img = node.querySelector('img');
      if(img) img.src = data;
      saveAll();
    }
  }catch(e){}
}

  let topClamped = top;

  if(leftClamped + w > window.innerWidth - 8) leftClamped = Math.max(8, window.innerWidth - w - 8);
  if(topClamped + h > window.innerHeight - 8) topClamped = Math.max(8, window.innerHeight - h - 8);
  if(leftClamped < 8) leftClamped = 8;
  if(topClamped < 8) topClamped = 8;

  engineMenuNode.style.left = leftClamped + 'px';
  engineMenuNode.style.top = topClamped + 'px';

function onDocClickCloseEngine(ev){ if(!engineBtn.contains(ev.target) && !(engineMenuNode && engineMenuNode.contains(ev.target))){ hideEngineMenu(); } }
function showEngineMenu(){
  const r = engineBtn.getBoundingClientRect();
  const menuW = ENGINE_MENU_SETTINGS.width;
  let left = r.left + ENGINE_MENU_SETTINGS.offsetX;
  let top;

  if(ENGINE_MENU_SETTINGS.prefer === 'bottom'){
    top = r.bottom + ENGINE_MENU_SETTINGS.offsetY;
  } else if (ENGINE_MENU_SETTINGS.prefer === 'top'){
    top = r.top - ENGINE_MENU_SETTINGS.offsetY;
  } else {
    left = r.left + (r.width - menuW) / 2 + ENGINE_MENU_SETTINGS.offsetX;
    top = r.bottom + ENGINE_MENU_SETTINGS.offsetY;
  }

  renderEngineMenu(left, top, menuW);
  engineBtn.setAttribute('aria-expanded','true');
}
function hideEngineMenu(){ engineMenuRoot.innerHTML=''; engineBtn.setAttribute('aria-expanded','false'); document.removeEventListener('click', onDocClickCloseEngine); engineMenuNode=null; engineManageMode=false; engineSelectionForDelete.clear(); }

function showAddModal(editNode=null, groupContext=null){
  modalMode = 'tile';
  currentEditNode = editNode;

  stagedIconData = null;
  currentGroupContext = groupContext || null;

  siteName.value = editNode ? (editNode.querySelector('.tile-label').textContent || '') : '';

    if(!/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(url)) url = 'https://' + url;

      const iconToSave = stagedIconData || (p.hostname ? 'https://www.google.com/s2/favicons?sz=128&domain=' + p.hostname : '');

      if(editNode) applyEdit(editNode,name,url,iconToSave); else createTile(name,url,iconToSave,currentGroupContext);
    }
    hideAddModal();
  };
}
function showEngineModal(editEngine=null){
  modalMode = 'engine';
  currentEditEngine = editEngine;
  currentEditNode = null;
  stagedIconData = null;
  siteName.placeholder = 'Название поисковика';
  siteUrl.placeholder = 'URL-шаблон (например https://www.google.com/search?q=)';
  siteName.value = editEngine ? (editEngine.name || '') : '';
  siteUrl.value = editEngine ? (editEngine.q || '') : '';
  iconUrlInput.value = editEngine ? (editEngine.icon || '') : '';
  stagedIconData = iconUrlInput.value || null;
  renderIconPreview(stagedIconData || (editEngine && editEngine.icon) || null);

  modalBackdrop.style.display='flex';
  modalBackdrop.style.pointerEvents='auto';
  modalBackdrop.setAttribute('aria-hidden','false');
  setTimeout(()=>siteName.focus(),50);

  saveAdd.onclick = ()=>{
    const name = siteName.value.trim();
    let q = siteUrl.value.trim();
    if(!name || !q){ alert('Укажи название и URL-шаблон поиска.'); return; }
    if(!/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(q)) q = 'https://' + q;
    if(currentEditEngine){
      // update existing
      currentEditEngine.name = name;
      currentEditEngine.q = q;
      currentEditEngine.icon = stagedIconData || '';
      // preserve id and builtin flag
    } else {
      // create new engine object
      const id = 'eng_' + Date.now() + Math.random().toString(36).slice(2,7);
      engines.push({ id, name, q, svg: '', icon: stagedIconData || '', builtin:false });
      // set new engine as selected by default
      selectedEngine = engines[engines.length - 1];
      try{ localStorage.setItem(PREF_ENGINE_KEY, selectedEngine.id); }catch(e){}
    }
    saveEnginesState();
    hideAddModal();
  };

function hideAddModal(){

  modalBackdrop.setAttribute('aria-hidden','true');
  saveAdd.onclick=null;
  currentEditNode=null;

  stagedIconData=null;
  modalMode='tile';

/* render preview in modal */
function renderIconPreview(src){
  iconPreview.innerHTML = '';
  const img = document.createElement('img');
  if(!src){
    img.src = DEFAULT_ICON_DATA_URL;
    img.alt = 'default';
    iconPreview.appendChild(img);
    return;
  }
  img.src = src;
  img.alt = 'icon';
  img.onload = ()=>{};
  img.onerror = ()=>{ img.src = DEFAULT_ICON_DATA_URL; };
  iconPreview.appendChild(img);
}

/* tiles create/edit/delete (now supports optional parentGroup) */
function createTile(name, url, icon, parentGroup=null){
  const node = document.createElement('div');
  node.className='tile';
  node.tabIndex=0;

  const btn = document.createElement('div');
  btn.className='tile-button';
  btn.setAttribute('role','button');
  btn.setAttribute('aria-label',name);

  const inner = document.createElement('div');
  inner.className='inner';
  inner.textContent = initials(name);
  btn.appendChild(inner);

  const img = document.createElement('img');
  node._icon = icon || '';
  (function setImgSrc(){
    try{
      if(node._icon){
        img.src = node._icon;
      } else {
        const p = new URL(url);
        img.src = 'https://www.google.com/s2/favicons?sz=128&domain=' + p.hostname;
      }
    }catch(e){
      img.src = DEFAULT_ICON_DATA_URL;
    }
    img.alt = name;
    img.onload = function(){ inner.style.display='none'; if(!btn.contains(img)) btn.appendChild(img); };
    img.onerror = function(){ inner.style.display='flex'; if(img.src !== DEFAULT_ICON_DATA_URL){ img.src = DEFAULT_ICON_DATA_URL; } };
    btn.appendChild(img);
  })();

  const label = document.createElement('div');
  label.className='tile-label';
  label.textContent = name;

  node.appendChild(btn);
  node.appendChild(label);
  node._url = url;

  // click: open unless in move-mode or if node belongs to group and group not expanded
  btn.addEventListener('click', (e)=>{
    if(isMoveMode || isGroupMoveMode){ e.stopPropagation(); e.preventDefault(); return; }
    if(node._parentGroup && !node._parentGroup._expanded){ e.stopPropagation(); e.preventDefault(); return; }
    openCurrent(node._url);
  });
  btn.addEventListener('keydown', (e)=>{ if(e.key==='Enter') openCurrent(node._url); });

  // context menu: only show when NOT in move-mode
  node.addEventListener('contextmenu', function(ev){
    ev.preventDefault();
    if(isMoveMode || isGroupMoveMode) return; // suppress in move mode
    showContextMenuAt(ev.clientX, ev.clientY, this);
  });

  // touch long-press => context (only when not in move mode)
  node.addEventListener('touchstart', function(ev){
    if(isMoveMode || isGroupMoveMode) return;
    const self=this;
    this._lp=setTimeout(()=>showContextMenuForNode(self),700);
  }, {passive:false});
  node.addEventListener('touchend', function(){ if(this._lp){ clearTimeout(this._lp); this._lp=null; } });

  if(parentGroup){
    // update group items array and preview
    const items = getGroupItems(parentGroup).slice();
    items.push({ name, url, icon: node._icon });
    setGroupItems(parentGroup, items);
    // immediately update group's small preview
    try{ renderGroupPreview(parentGroup); }catch(e){}

    // if this group's popup is currently open, append new subtile to the popup grid so user sees it instantly
    try{
      if(currentGroupOpen === parentGroup && groupPopupNode){
        const grid = groupPopupNode.querySelector('.grid');
        if(grid){
          const sub = document.createElement('div');
          sub.className = 'subtile';
          const b2 = document.createElement('div'); b2.className = 'tile-button'; b2.style.aspectRatio = '1/1';
          // set same size as main tiles
          const tW = computeMainTileSize();
          b2.style.width = tW + 'px';
          b2.style.height = tW + 'px';
          b2.style.display = 'flex';
          b2.style.alignItems = 'center';
          b2.style.justifyContent = 'center';

          const img2 = document.createElement('img'); img2.src = node._icon || DEFAULT_ICON_DATA_URL; img2.alt = name; img2.style.maxWidth='70%'; img2.style.maxHeight='70%';
          b2.appendChild(img2);
          const lab2 = document.createElement('div'); lab2.className = 'tile-label'; lab2.style.fontSize='12px'; lab2.textContent = name;
          lab2.style.textAlign = 'center';
          lab2.style.width = '100%';
          sub.appendChild(b2); sub.appendChild(lab2);
          sub._meta = { name: name, url: url, icon: node._icon };
          sub.addEventListener('click',(ev)=>{ ev.stopPropagation(); try{ if(sub._meta && sub._meta.url) window.open(sub._meta.url,'_blank'); }catch(e){} });
          sub.addEventListener('contextmenu',(ev)=>{ ev.preventDefault(); showContextMenuAt(ev.clientX, ev.clientY, sub); });
          let lp=null; sub.addEventListener('touchstart',(ev)=>{ lp=setTimeout(()=>{ const t = ev.touches && ev.touches[0]; showContextMenuAt(t? t.clientX: window.innerWidth/2, t? t.clientY: window.innerHeight/2, sub); }, 500); },{passive:true});
          sub.addEventListener('touchend',()=>{ if(lp){ clearTimeout(lp); lp=null; } });
          grid.appendChild(sub);
          // if in move mode, attach controls
          if(isMoveMode || isGroupMoveMode){
            addDeleteXToSub(sub, parentGroup);
            enableDragForSubtile(sub, parentGroup);
          }
          // ensure preview also updated
          try{ renderGroupPreview(parentGroup); }catch(e){}
        }
      }
    }catch(e){}
    node._parentGroup = parentGroup;
    // keep node in group's container for possible future use (not appended to main tiles)
    parentGroup._container.appendChild(node);
    saveAll();
  } else {
    tiles.insertBefore(node, addTile);
    // push to recent history for group previews
    createdHistory.push({ name, icon: node._icon });
    if(createdHistory.length > 50) createdHistory.shift();
    saveAll();
  }

  // Try to fetch and embed icon as dataURL for offline use (best-effort)
  ensureIconStoredForNode(node);

  return node;
}

function initials(name){
  const p = name.trim().split(/\s+/);
  if(p.length===1) return p[0].slice(0,2).toUpperCase();
  return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
}

function applyEdit(node, name, url, icon){
  node.querySelector('.tile-label').textContent = name;
  node._url = url;
  node._icon = icon || '';
  const inner = node.querySelector('.inner');
  inner.style.display='flex';
  inner.textContent = initials(name);
  const oldImg = node.querySelector('img');
  if(oldImg) oldImg.remove();
  const newImg = document.createElement('img');
  try{
    if(node._icon){
      newImg.src = node._icon;
    } else {
      const p = new URL(url);
      newImg.src = 'https://www.google.com/s2/favicons?sz=128&domain=' + p.hostname;
    }
    newImg.alt = name;
    newImg.onload = function(){ inner.style.display='none'; node.querySelector('.tile-button').appendChild(newImg); };
    newImg.onerror = function(){ inner.style.display='flex'; if(newImg.src !== DEFAULT_ICON_DATA_URL) { newImg.src = DEFAULT_ICON_DATA_URL; } };
    node.querySelector('.tile-button').appendChild(newImg);
  }catch(e){
    // if url invalid - still attach default
    newImg.src = DEFAULT_ICON_DATA_URL;
    newImg.alt = name;
    newImg.onload = function(){ inner.style.display='none'; node.querySelector('.tile-button').appendChild(newImg); };
  }
  saveAll();
  // try to fetch and store icon as dataURL
  ensureIconStoredForNode(node);
}

/* ===== GROUPS: create group tile, preview and popup ===== */
function createGroup(name){
  const node = document.createElement('div');
  node.className='tile group-tile';
  node.tabIndex=0;
  node._isGroup = true;
  node._groupName = name || 'Группа';
  setGroupItems(node, []);

  const btn = document.createElement('div');
  btn.className='tile-button group-button';
  btn.setAttribute('role','button');
  btn.setAttribute('aria-label', 'Группа: ' + node._groupName);

  // preview 2x2
  const preview = document.createElement('div');
  preview.className = 'group-preview-grid';
  btn.appendChild(preview);

  const label = document.createElement('div');
  label.className='tile-label';
  label.textContent = node._groupName;

  node.appendChild(btn);
  node.appendChild(label);

  // store container for group's internal tiles when expanded
  node._container = document.createElement('div');
  node._container.className = 'group-inner-container';

  // render preview using createdHistory (last 4)
  renderGroupPreview(node);

  btn.addEventListener('click', (e)=>{
    e.stopPropagation();
    if(isMoveMode || isGroupMoveMode) return;
    toggleGroupPopup(node);
  });

  // context menu for group (edit name, delete, move)
  node.addEventListener('contextmenu', function(ev){ ev.preventDefault(); if(isMoveMode || isGroupMoveMode) return; showContextMenuAt(ev.clientX, ev.clientY, this); });

  tiles.insertBefore(node, addTile);
  saveAll();
  return node;
}

function renderGroupPreview(groupNode){
  const preview = groupNode.querySelector('.group-preview-grid');
  if(!preview) return;
  preview.innerHTML = '';
  // Only show group's own items (up to 4).
  const items = getGroupItems(groupNode).slice(0,4);
  for(let i=0;i<4;i++){
    const el = document.createElement('div');
    el.className = 'group-preview-item';
    if(items[i]){
      const im = document.createElement('img');
      im.src = items[i].icon || DEFAULT_ICON_DATA_URL;
      im.alt = items[i].name || '';
      im.style.maxWidth='100%'; im.style.maxHeight='100%'; im.style.objectFit='cover';
      im.onerror = function(){ this.remove(); };
      el.appendChild(im);
    }
    preview.appendChild(el);
  }
}

let currentGroupOpen = null;
let groupPopupNode = null;

/* helper: render popup grid content from group's stored items (used to open and to restore on cancel) */
function renderGroupPopupContent(groupNode){
  if(!groupPopupNode) return;
  const grid = groupPopupNode.querySelector('.grid');
  if(!grid) return;
  grid.innerHTML = '';
  const items = Array.isArray(getGroupItems(groupNode)) ? getGroupItems(groupNode).slice() : [];
  const mainTileSize = computeMainTileSize();

  // Make grid columns fixed to tile size so subtile spacing is compact (3 columns)
  grid.style.gridTemplateColumns = `repeat(3, ${mainTileSize}px)`;
  grid.style.gridAutoRows = mainTileSize + 'px';
  grid.style.justifyContent = 'center';
  grid.style.gap = Math.max(8, Math.round(mainTileSize * 0.08)) + 'px';

  items.forEach(it => {
    const sub = document.createElement('div');
    sub.className = 'subtile';
    sub.style.width = mainTileSize + 'px';
    sub.style.boxSizing = 'border-box';
    sub.style.display = 'flex';
    sub.style.flexDirection = 'column';
    sub.style.alignItems = 'center';
    sub.style.justifyContent = 'flex-start';
    sub.style.gap = '6px';
    const b = document.createElement('div');
    b.className='tile-button';
    b.style.aspectRatio='1/1';
    b.style.width = mainTileSize + 'px';
    b.style.height = mainTileSize + 'px';
    b.style.display = 'flex';
    b.style.alignItems = 'center';
    b.style.justifyContent = 'center';
    const img = document.createElement('img'); img.src = it.icon || DEFAULT_ICON_DATA_URL; img.alt = it.name; img.style.maxWidth='70%'; img.style.maxHeight='70%';
    b.appendChild(img);
    const lab = document.createElement('div'); lab.className='tile-label'; lab.style.fontSize='12px'; lab.style.textAlign = 'center'; lab.style.width='100%'; lab.style.overflow='hidden'; lab.style.textOverflow='ellipsis'; lab.style.whiteSpace='nowrap'; lab.textContent = it.name;
    sub.appendChild(b); sub.appendChild(lab);
    sub._meta = { name: it.name, url: it.url, icon: it.icon };
    // allow contextmenu on desktop
    sub.addEventListener('contextmenu', (ev)=>{ ev.preventDefault(); showContextMenuAt(ev.clientX, ev.clientY, sub); });
    // click to open
    sub.addEventListener('click', (ev)=>{ ev.stopPropagation(); try{ window.open(it.url, '_blank'); }catch(e){} });

    // long-press handlers (mouse and touch) to show same context menu as main tiles
    let lpTimer = null;
    sub.addEventListener('mousedown', (ev)=>{ lpTimer = setTimeout(()=>{ showContextMenuAt(ev.clientX, ev.clientY, sub); }, 550); });
    sub.addEventListener('mouseup', ()=>{ if(lpTimer){ clearTimeout(lpTimer); lpTimer=null; } });
    sub.addEventListener('mouseleave', ()=>{ if(lpTimer){ clearTimeout(lpTimer); lpTimer=null; } });
    sub.addEventListener('touchstart', (ev)=>{ const t = ev.touches && ev.touches[0]; lpTimer = setTimeout(()=>{ if(t) showContextMenuAt(t.clientX, t.clientY, sub); }, 550); }, {passive:true});
    sub.addEventListener('touchend', ()=>{ if(lpTimer){ clearTimeout(lpTimer); lpTimer=null; } });

    grid.appendChild(sub);
  });

  // if group move mode is active, attach delete icons and enable drag
  if(isGroupMoveMode){
    const subs = Array.from(grid.querySelectorAll('.subtile'));
    subs.forEach(s => {
      try{ addDeleteXToSub(s, groupNode); }catch(e){}
      try{ enableDragForSubtile(s, groupNode); }catch(e){}
    });
  }
}

/* Strong, explicit "delete all" handler for a group (works from popup header or other places) */
function deleteAllGroupItems(groupNode){
  if(!groupNode) return;
  // ask confirm
  if(!confirm('Удалить все элементы в группе "' + (groupNode._groupName||'Группа') + '"? Это действие будет окончательным.')) return;

  // ensure we are not stuck in group-move mode — exit it before destructive action to restore listeners and avoid blocking context menus
  if(isGroupMoveMode){
    try{ exitGroupMoveMode(false); }catch(e){ console.error('deleteAllGroupItems exitGroupMoveMode error', e); }
  }

  // clear storage
  try{
    setGroupItems(groupNode, []);
  }catch(e){ console.error('setGroupItems error', e); }

  // clear internal container DOM if present
  try{
    if(groupNode._container){
      while(groupNode._container.firstChild) groupNode._container.removeChild(groupNode._container.firstChild);
    }
  }catch(e){ console.error('clear _container error', e); }

  // clear popup grid DOM if popup open for this group
  try{
    if(groupPopupNode && currentGroupOpen === groupNode){
      const grid = groupPopupNode.querySelector('.grid');
      if(grid){
        while(grid.firstChild) grid.removeChild(grid.firstChild);
      }
    }
  }catch(e){ console.error('clear popup grid error', e); }

  // update preview, save
  renderGroupPreview(groupNode);
  saveAll();

  // After deletion, ensure normal context menus work (group move mode already exited)
  // no further action required
}

/* external close button positioning (right bottom under popup) */
function createExternalGroupCloseButton(){
  destroyExternalGroupCloseButton();
  externalGroupCloseBtn = document.createElement('div');
  externalGroupCloseBtn.className = 'group-popup-external-close';
  const btn = document.createElement('button');
  btn.className = 'btn ghost';
  btn.textContent = 'Закрыть';
  btn.addEventListener('click', (e)=>{ e.stopPropagation(); closeGroupPopup(); });
  externalGroupCloseBtn.appendChild(btn);
  document.body.appendChild(externalGroupCloseBtn);

  function reposition(){
    if(!groupPopupNode || !externalGroupCloseBtn) return;

    // If groupMoveControls exist (in move mode), place external close to the right of them;
    // otherwise place under popup as before.
    if(groupMoveControls){
      try{
        const gRect = groupMoveControls.getBoundingClientRect();
        const ebRect = externalGroupCloseBtn.getBoundingClientRect();
        let left = Math.round(gRect.right + 8);
        let top = Math.round(gRect.top);
        if(left + ebRect.width > window.innerWidth - 8) left = Math.max(8, window.innerWidth - ebRect.width - 8);
        if(left < 8) left = 8;
        if(top + ebRect.height > window.innerHeight - 8) top = Math.max(8, window.innerHeight - ebRect.height - 8);
        if(top < 8) top = 8;
        externalGroupCloseBtn.style.left = left + 'px';
        externalGroupCloseBtn.style.top = top + 'px';
        return;
      }catch(e){}
    }

    const rect = groupPopupNode.getBoundingClientRect();
    const btnRect = externalGroupCloseBtn.getBoundingClientRect();
    // place right-aligned under popup with small padding
    let left = Math.round(rect.right - btnRect.width - 12);
    let top = Math.round(rect.bottom + 12);
    if(left + btnRect.width > window.innerWidth - 8) left = Math.max(8, window.innerWidth - btnRect.width - 8);
    if(left < 8) left = 8;
    if(top + btnRect.height > window.innerHeight - 8) top = Math.max(8, window.innerHeight - btnRect.height - 8);
    if(top < 8) top = 8;
    externalGroupCloseBtn.style.left = left + 'px';
    externalGroupCloseBtn.style.top = top + 'px';
  }
  externalGroupCloseRepositionHandler = reposition;
  window.addEventListener('resize', externalGroupCloseRepositionHandler);
  window.addEventListener('scroll', externalGroupCloseRepositionHandler, {passive:true});
  setTimeout(()=>reposition(), 10);
}
function destroyExternalGroupCloseButton(){
  if(!externalGroupCloseBtn) return;
  try{
    window.removeEventListener('resize', externalGroupCloseRepositionHandler);
    window.removeEventListener('scroll', externalGroupCloseRepositionHandler);
  }catch(e){}
  externalGroupCloseRepositionHandler = null;
  externalGroupCloseBtn.remove();
  externalGroupCloseBtn = null;
}

function toggleGroupPopup(groupNode){
  if(currentGroupOpen === groupNode){
    closeGroupPopup();
    return;
  }
  openGroupPopup(groupNode);
}

function openGroupPopup(groupNode){
  closeGroupPopup();
  currentGroupOpen = groupNode;
  groupNode._expanded = true;

  groupPopupNode = document.createElement('div');
  groupPopupNode.className = 'group-popup';

  // Determine square size that fits viewport, with margins
  const margin = 32;
  const maxSide = Math.min(window.innerWidth - margin, window.innerHeight - margin);
  const defaultSide = Math.min(360, maxSide);
  const side = Math.max(240, defaultSide); // ensure reasonable minimum
  groupPopupNode.style.width = side + 'px';
  groupPopupNode.style.height = side + 'px';

  // center on screen
  const left = Math.max(8, Math.round((window.innerWidth - side) / 2));
  const top  = Math.max(8, Math.round((window.innerHeight - side) / 2));

  groupPopupNode.style.left = left + 'px';
  groupPopupNode.style.top = top + 'px';

  

// header
  const header = document.createElement('div');
  header.className = 'popup-header';

  const htitle = document.createElement('div');
  htitle.className = 'title';
  htitle.textContent = groupNode._groupName || 'Группа';

  const hactions = document.createElement('div');
  hactions.className = 'actions';

  // IMPORT button for group (left of +)
  const importInnerBtn = document.createElement('button');
  importInnerBtn.className = 'btn ghost small';
  importInnerBtn.textContent = 'Импорт';
  importInnerBtn.title = 'Импорт ссылок в эту группу (.html/.txt)';
  importInnerBtn.addEventListener('click', async (e)=>{
    e.stopPropagation();
    await importUrlsFromFile(groupNode);
  });

  // + (add) button with small label underneath
  const addInnerBtn = document.createElement('button');
  addInnerBtn.className = 'btn ghost';
  addInnerBtn.textContent = '+';
  addInnerBtn.title = 'Добавить ярлык в группу';
  addInnerBtn.addEventListener('click', (e)=>{ e.stopPropagation(); showAddModal(null, groupNode); });

  const addWrap = document.createElement('div');
  addWrap.className = 'add-wrap';
  addWrap.appendChild(addInnerBtn);
  const addLabel = document.createElement('div');
  addLabel.style.fontSize = '11px';
  addLabel.style.color = 'var(--muted)';
  addLabel.textContent = 'добавить';
  addWrap.appendChild(addLabel);

  // append controls to the actions area (no duplicate "Удалить все" here)
  hactions.appendChild(importInnerBtn);
  hactions.appendChild(addWrap);

  header.appendChild(htitle);
  header.appendChild(hactions);

  groupPopupNode.appendChild(header);

  // grid for items
  const grid = document.createElement('div');
  grid.className = 'grid';

  groupPopupNode.appendChild(grid);

  // Note: internal close button kept hidden; we use external close button placed below popup
  const closeWrap = document.createElement('div');
  closeWrap.className = 'popup-close';
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn ghost';
  closeBtn.textContent = 'Закрыть';
  closeBtn.addEventListener('click', (e)=>{ e.stopPropagation(); closeGroupPopup(); });
  closeWrap.appendChild(closeBtn);
  // do not append to popup, we'll render external button instead
  // groupPopupNode.appendChild(closeWrap);

  document.body.appendChild(groupPopupNode);

  // populate content
  renderGroupPopupContent(groupNode);

  // re-render preview small icons
  renderGroupPreview(groupNode);

  // create external close button under popup (right side)
  createExternalGroupCloseButton();

  // close on outside click (with race protection)
  setTimeout(()=>document.addEventListener('click', onDocClickCloseGroupPopup), 0);
}

function closeGroupPopup(){
  if(!groupPopupNode) return;
  // Если мы в режиме перемещения группы — отменим его (чтобы восстановить все слушатели/флаги),
  // иначе просто уничтожим контролы (на всякий случай).
  if(isGroupMoveMode){
    try{ exitGroupMoveMode(false); }catch(e){ console.error('closeGroupPopup exitGroupMoveMode error', e); }
  } else {
    destroyGroupMoveControls();
  }

  groupPopupNode.remove();
  groupPopupNode = null;
  destroyExternalGroupCloseButton();
  if(currentGroupOpen){ currentGroupOpen._expanded = false; currentGroupOpen = null; }
  document.removeEventListener('click', onDocClickCloseGroupPopup);
}

function onDocClickCloseGroupPopup(e){
  if(skipGroupPopupClose){ skipGroupPopupClose = false; return; }
  if(!(groupPopupNode && groupPopupNode.contains(e.target))) closeGroupPopup();
}

/* context menu: синхронное вычисление позиции, не прыгает */
let contextMenuNode = null;
function renderContextMenu(x,y,node){
  contextRootPrevZ = contextRoot.style.zIndex || '';
  try{ contextRoot.style.zIndex = '2100'; }catch(e){}

  contextRoot.innerHTML='';
  contextMenuNode = document.createElement('div');
  contextMenuNode.className='menu';
  contextMenuNode.style.pointerEvents='auto';

  const btnOpen = document.createElement('button');
  btnOpen.textContent = 'Открыть в новой вкладке';
  btnOpen.addEventListener('click', ()=>{ if(node){ const url = node._url || (node._meta && node._meta.url); if(url) window.open(url, '_blank', 'noopener'); } closeContextMenu(); });

  const btnMove = document.createElement('button');
  btnMove.textContent = 'Переместить';
  btnMove.addEventListener('click', ()=>{
    // предотвратить немедленное закрытие попапа группы
    skipGroupPopupClose = true;
    closeContextMenu();
    if(currentGroupOpen && (node && (node._meta || (node._isGroup && node === currentGroupOpen)))){
      enterGroupMoveMode(currentGroupOpen);
    } else {
      enterMoveMode();
    }
    setTimeout(()=>{ skipGroupPopupClose = false; }, 0);
  });

  const btnEdit = document.createElement('button');
  btnEdit.textContent = 'Изменить';
  btnEdit.addEventListener('click', ()=>{
    closeContextMenu();
    if(node && node._meta){
      // editing a subtile inside group: use modal so fields are consistent
      showEditGroupItemModal(node);
      return;
    } else if(node && node._isGroup){
      const oldName = node._groupName || '';
      const newName = prompt('Название группы:', oldName);
      if(newName === null) return;
      node._groupName = newName;
      const lbl = node.querySelector('.tile-label');
      if(lbl) lbl.textContent = newName;
      if(currentGroupOpen === node && groupPopupNode){
        const headerTitle = groupPopupNode.querySelector('.popup-header > div');
        if(headerTitle) headerTitle.textContent = newName;
      }
      saveAll();
      return;
    } else {
      // node is a regular tile: pass the tile node directly to modal so fields are prefilled
      showAddModal(node, node._parentGroup || null);
    }
  });

  const btnDel = document.createElement('button');
  btnDel.textContent = 'Удалить';
  btnDel.addEventListener('click', ()=>{ if(node){
    if(node._meta){
      // subtile inside group
      if(confirm('Удалить этот элемент из группы?')){
        const parent = node.parentElement;
        const idx = Array.from(parent.children).indexOf(node);
        node.remove();
        if(currentGroupOpen){ const g = currentGroupOpen; if(g){ const items = getGroupItems(g).slice(); items.splice(idx,1); setGroupItems(g, items); renderGroupPreview(g); saveAll(); }}
      }
    } else if(node._isGroup){
      if(confirm('Удалить группу и все её элементы?')){ node.remove(); saveAll(); }
    } else {
      node.remove(); saveAll();
    }
  } closeContextMenu(); });

  contextMenuNode.appendChild(btnOpen);
  contextMenuNode.appendChild(btnMove);
  contextMenuNode.appendChild(btnEdit);
  contextMenuNode.appendChild(btnDel);

  contextRoot.appendChild(contextMenuNode);

  // initial pos + clamp
  contextMenuNode.style.left = x + 'px';
  contextMenuNode.style.top  = y + 'px';
  const rect = contextMenuNode.getBoundingClientRect();
  let left = x;
  let top = y;
  if(left + rect.width > window.innerWidth - 8) left = Math.max(8, window.innerWidth - rect.width - 8);
  if(top + rect.height > window.innerHeight - 8) top = Math.max(8, window.innerHeight - rect.height - 8);
  contextMenuNode.style.left = left + 'px';
  contextMenuNode.style.top = top + 'px';

  contextRoot.style.pointerEvents = 'auto';
  setTimeout(()=>document.addEventListener('click', onDocClickCloseContext), 0);
}
function showContextMenuAt(x,y,node){
  if(isMoveMode || isGroupMoveMode) return;
  renderContextMenu(x,y,node);
}
function showContextMenuForNode(node){
  if(isMoveMode || isGroupMoveMode) return;
  const r = node.getBoundingClientRect();
  renderContextMenu(r.left + 8, r.top + 8, node);
}
function onDocClickCloseContext(e){ if(!(contextMenuNode && contextMenuNode.contains(e.target))) closeContextMenu(); }
function closeContextMenu(){ contextRoot.innerHTML=''; contextRoot.style.pointerEvents='none'; contextMenuNode=null; document.removeEventListener('click', onDocClickCloseContext); try{ contextRoot.style.zIndex = contextRootPrevZ || '996'; }catch(e){} }

/* Block native contextmenu during move mode (capture phase) */
document.addEventListener('contextmenu', function(e){
  if(isMoveMode || isGroupMoveMode){
    e.preventDefault();
  }
}, true);

/* save/load (расширено для групп) */
function saveAll(){
  const arr=[];
  tiles.querySelectorAll('.tile').forEach(n => { if(n===addTile) return; if(n._isGroup){ arr.push({ type:'group', name: n._groupName || '', items: (getGroupItems(n) || []).map(it=>({ name: it.name, url: it.url, icon: it.icon })) }); } else { arr.push({ type:'tile', name: n.querySelector('.tile-label')?.textContent || '', url: n._url || '', icon: n._icon || '' }); } });
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }catch(e){}
  saveEnginesState();
}
function loadAll(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const arr = JSON.parse(raw);
    arr.forEach(s => {
      if(!s) return;
      if(s.type === 'group'){
        const g = createGroup(s.name || 'Группа');
        setGroupItems(g, s.items || []);
        // ensure preview updated
        renderGroupPreview(g);
      } else if(s.type === 'tile'){
        createTile(s.name, s.url, s.icon || '');
      }
    });
  }catch(e){}
}

/* ===== Move mode implementation (main grid) ===== */

function takeSnapshot(){
  const arr = [];
  const nodes = Array.from(tiles.querySelectorAll('.tile'));
  nodes.forEach(n => { if(n===addTile) return; if(n._isGroup){ arr.push({ type:'group', name: n._groupName || '', items: (getGroupItems(n) || []).map(it=>({ name: it.name, url: it.url, icon: it.icon })) }); } else { arr.push({ type:'tile', name: n.querySelector('.tile-label')?.textContent || '', url: n._url || '', icon: n._icon || '' }); } });
  return arr;
}

function enterMoveMode(){
  if(isMoveMode) return;
  if(isGroupMoveMode) return;
  isMoveMode = true;
  snapshotBeforeMove = takeSnapshot();
  deletedDuringMove = [];

  createMoveControls();

  const contRect = tiles.getBoundingClientRect();
  const nodes = Array.from(tiles.querySelectorAll('.tile'));
  // convert to absolute layout but using компонентный расчёт ширины плитки
  const tileGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--tile-gap')) || 10;
  const cols = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cols'), 10) || 4;
  const contWidth = Math.max(tiles.clientWidth, tiles.getBoundingClientRect().width);
  const totalGap = (cols - 1) * tileGap;
  let tileWidth = Math.max(48, Math.floor((contWidth - totalGap) / cols));

  const maxTileSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--max-tile-size')) || 120;
  tileWidth = Math.min(tileWidth, maxTileSize);

  nodes.forEach((n, idx)=>{
    if(n===addTile) return;
    const row = Math.floor(idx / cols);
    const col = idx % cols;

    // Save inline styles
    n._origStyle = {
      position: n.style.position || '',
      left: n.style.left || '',
      top: n.style.top || '',
      width: n.style.width || '',
      height: n.style.height || '',
      zIndex: n.style.zIndex || ''
    };

    n.style.position = 'absolute';
    n.style.left = (col * (tileWidth + tileGap)) + 'px';
    n.style.top  = (row * (tileWidth + tileGap)) + 'px';
    n.style.width = tileWidth + 'px';
    n.style.height = tileWidth + 'px';
    n.style.zIndex = 1000;

    addDeleteX(n);
    enableDragForTile(n);
  });

  // ensure subtile delete/drag attach if popup open
  if(groupPopupNode && currentGroupOpen){
    const subs = Array.from(groupPopupNode.querySelectorAll('.subtile'));
    subs.forEach(s=>{
      try{ addDeleteXToSub(s, currentGroupOpen); }catch(e){}
      try{ enableDragForSubtile(s, currentGroupOpen); }catch(e){}
    });
  }

  // prevent layout jump and setup flow
  tiles.style.minHeight = Math.max(contRect.height, tiles.offsetHeight) + 'px';
  window.addEventListener('resize', onWindowResize);
  window.addEventListener('orientationchange', onWindowResize);

  buildFlowOrder();
  updateFlowPositions(false);
}

function exitMoveMode(commit=true){
  if(!isMoveMode) return;
  // выход из режима перемещения — сначала пометим, что режим закончился
  isMoveMode = false;

  // Если пользователь нажал ОТМЕНА (commit === false), восстанавливаем снимок сразу —
  // это гарантирует, что все удалённые плитки вернутся на место прежде чем мы будем убирать
  // визуальные артефакты и обработчики. Мы используем копию snapshotBeforeMove, чтобы
  // случайные модификации в дальнейшем не повлияли на восстановление.
  if(!commit){
    try{
      rebuildFromSnapshot(Array.isArray(snapshotBeforeMove) ? snapshotBeforeMove.slice() : []);
    }catch(e){
      console.error('exitMoveMode restore error', e);
    }
  }

  // очистим интерфейс у текущих плиток (включая восстановленные)
  const nodes = Array.from(tiles.querySelectorAll('.tile'));
  nodes.forEach(n=>{
    if(n===addTile) return;
    try{ disableDragForTile(n); }catch(e){}
    try{ removeDeleteX(n); }catch(e){}
    if(n._origStyle){
      n.style.position = n._origStyle.position;
      n.style.left = n._origStyle.left;
      n.style.top = n._origStyle.top;
      n.style.width = n._origStyle.width;
      n.style.height = n._origStyle.height;
      n.style.zIndex = n._origStyle.zIndex;
      n._origStyle = null;
    } else {
      n.style.position = '';
      n.style.left = '';
      n.style.top = '';
      n.style.width = '';
      n.style.height = '';
      n.style.zIndex = '';
    }
    n.classList.remove('dragging');
    n.classList.remove('drop-target');
  });

  // удалить контролы у subtile в открытой группе
  if(groupPopupNode && currentGroupOpen){
    const subs = Array.from(groupPopupNode.querySelectorAll('.subtile'));
    subs.forEach(s=>{
      try{ removeDeleteXFromSub(s); }catch(e){}
      try{ disableDragForSubtile(s); }catch(e){}
    });
  }

  destroyMoveControls();
  window.removeEventListener('resize', onWindowResize);
  window.removeEventListener('orientationchange', onWindowResize);

  if(commit){
    // подтверждение: сохраним порядок/состояние
    commitPositionsAndSave();
  } else {
    // отмена: уже восстановлено выше — ничего дополнительно не сохраняем, чтобы не перезаписать
    // snapshotBeforeMove. Также очистим временные списки.
    deletedDuringMove = [];
  }
  tiles.style.minHeight = '';
}

/* delete overlay */
function addDeleteX(tile){
  if(tile.querySelector('.move-delete')) return;
  const x = document.createElement('div');
  x.className = 'move-delete';
  x.innerHTML = '✕';
  x.title = 'Удалить';
  x.addEventListener('click', (ev)=>{
    ev.stopPropagation();
    const name = tile.querySelector('.tile-label')?.textContent || '';
    const url = tile._url || '';
    const idx = getFlowIndex(tile);
    deletedDuringMove.push({ name, url, index: idx });
    tile.remove();
    buildFlowOrder();
    updateFlowPositions(true);
  });
  tile.appendChild(x);
}

function removeDeleteX(tile){
  const x = tile.querySelector('.move-delete');
  if(x) x.remove();
}

/* --- Добавление/удаление крестика для subtile (в группе)
   Изменено: во время режима перемещения группы удаления не применяются в storage до подтверждения.
*/

function addDeleteXToSub(sub, group){
  if(!sub) return;
  if(sub.querySelector('.move-delete')) return;
  const x = document.createElement('div');
  x.className = 'move-delete';
  x.innerHTML = '✕';
  x.title = 'Удалить';
  x.addEventListener('click', (ev)=>{
    ev.stopPropagation();
    const idx = Array.from(sub.parentElement.children).indexOf(sub);
    // Если мы в group-move mode, то удаление делаем "временным" (без сохранения в storage),
    // чтобы можно было отменить изменения. Просто удаляем элемент из DOM и запоминаем.
    if(isGroupMoveMode){
      groupMoveDeleted.push({ index: idx, meta: sub._meta ? Object.assign({}, sub._meta) : null });
      sub.remove();
      // обновим временный dataset/preview
      try{
        const newItems = [];
        const children = Array.from(sub.parentElement.children);
        children.forEach(ch => {
          if(ch._meta) newItems.push({ name: ch._meta.name, url: ch._meta.url, icon: ch._meta.icon });
          else {
            const lname = ch.querySelector('.tile-label')?.textContent || '';
            const limg = ch.querySelector('img')?.src || '';
            const lurl = ch._meta && ch._meta.url ? ch._meta.url : '';
            newItems.push({ name: lname, url: lurl, icon: limg });
          }
        });
        setGroupItems(group, newItems);
        renderGroupPreview(group);
      }catch(e){}
      return;
    }
    // обычное удаление (вне режима перемещения группы) — удаляем и сохраняем
    sub.remove();
    if(group && Array.isArray(getGroupItems(group)) && idx >= 0){
      const items = getGroupItems(group).slice();
      items.splice(idx, 1);
      setGroupItems(group, items);
      renderGroupPreview(group);
      saveAll();
    }
  });

  // Важно: размещаем крестик внутри .tile-button если он есть, иначе в суб-элемент
  const _delContainer = sub.querySelector('.tile-button') || sub;
  _delContainer.appendChild(x);
}

function removeDeleteXFromSub(sub){
  if(!sub) return;
  const x = sub.querySelector('.move-delete');
  if(x) x.remove();
}

/* move mode helpers for subtile (drag inside popup) */
function enableDragForSubtile(sub, group){
  if(!sub) return;
  const handle = sub.querySelector('.tile-button') || sub;
  handle.style.touchAction = 'none';
  let localDrag = null;
  let hold = null;

  function clearHold(){ if(hold){ clearTimeout(hold); hold = null; } }

  function startDrag(clientX, clientY){
    const grid = sub.parentElement;
    const gridRect = grid.getBoundingClientRect();
    const subRect = sub.getBoundingClientRect();
    sub.style.width = subRect.width + 'px';
    sub.style.height = subRect.height + 'px';
    sub.style.position = 'absolute';
    sub.style.left = (subRect.left - gridRect.left) + 'px';
    sub.style.top = (subRect.top - gridRect.top) + 'px';
    sub.style.zIndex = 2200;
    sub.classList.add('dragging');
    localDrag = { sub, grid, offsetX: clientX - subRect.left, offsetY: clientY - subRect.top };
    grid.appendChild(sub);
  }

  function onPointerMove(e){
    if(!localDrag) return;
    e.preventDefault();
    const gridRect = localDrag.grid.getBoundingClientRect();
    const newLeft = e.clientX - gridRect.left - localDrag.offsetX;
    const newTop = e.clientY - gridRect.top  - localDrag.offsetY;
    sub.style.left = Math.max(0, Math.round(newLeft)) + 'px';
    sub.style.top = Math.max(0, Math.round(newTop)) + 'px';

    const items = Array.from(localDrag.grid.children).filter(n => n !== sub);
    if(items.length === 0) return;
    let nearest = { idx: 0, dist: Infinity };
    const cx = e.clientX;
    for(let i=0;i<items.length;i++){
      const r = items[i].getBoundingClientRect();
      const centerX = r.left + r.width/2;
      const centerY = r.top + r.height/2;
      const dx = cx - centerX;
      const dy = (e.clientY) - centerY;
      const d2 = dx*dx + dy*dy;
      if(d2 < nearest.dist){ nearest = { idx: i, dist: d2 }; }
    }
    const refRect = items[nearest.idx].getBoundingClientRect();
    const targetIdx = (cx > (refRect.left + refRect.width/2)) ? nearest.idx + 1 : nearest.idx;
    const reference = items[targetIdx] || null;
    localDrag.grid.insertBefore(sub, reference);
  }

  function endDrag(e){
    clearHold();
    if(!localDrag) return;
    const grid = localDrag.grid;
    const children = Array.from(grid.children);
    sub.style.position = ''; sub.style.left = ''; sub.style.top = ''; sub.style.width = ''; sub.style.height = ''; sub.style.zIndex = '';
    sub.classList.remove('dragging');

    if(group){
      const newItems = [];
      children.forEach(ch => {
        if(ch._meta) newItems.push({ name: ch._meta.name, url: ch._meta.url, icon: ch._meta.icon });
        else { const lname = ch.querySelector('.tile-label')?.textContent || ''; const limg = ch.querySelector('img')?.src || ''; const lurl = ch._meta && ch._meta.url ? ch._meta.url : ''; newItems.push({ name: lname, url: lurl, icon: limg }); }
      });
      // While in group move mode, do not save to storage; just update a temporary in-popup representation.
      if(isGroupMoveMode){
        // update groupPopupNode internal representation by rewriting group popup items only (not saving)
        // We'll apply final setGroupItems on commit
        // For simplicity, reflect new order into dataset for the group node (not persisted until commit)
        try{
          setGroupItems(group, newItems);
          renderGroupPreview(group);
        }catch(e){}
      } else {
        setGroupItems(group, newItems);
        renderGroupPreview(group);
        saveAll();
      }
    }
    localDrag = null;
  }

  function onPointerDown(e){
    if(!(isMoveMode || isGroupMoveMode)) return;
    e.preventDefault();
    clearHold();
    hold = setTimeout(()=> startDrag(e.clientX, e.clientY), 120);
    window.addEventListener('pointermove', onPointerMove, {passive:false});
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('pointercancel', onPointerUp);
  }
  function onPointerUp(e){ clearHold(); endDrag(e); window.removeEventListener('pointermove', onPointerMove); window.removeEventListener('pointerup', onPointerUp); window.removeEventListener('pointercancel', onPointerUp); }

  function onMouseDown(e){ if(!(isMoveMode || isGroupMoveMode)) return; e.preventDefault(); clearHold(); hold = setTimeout(()=> startDrag(e.clientX, e.clientY), 120); function mm(ev){ onPointerMove(ev); } function mu(ev){ clearHold(); endDrag(ev); window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); } window.addEventListener('mousemove', mm); window.addEventListener('mouseup', mu); }
  function onTouchStart(e){ if(!(isMoveMode || isGroupMoveMode)) return; clearHold(); const t = e.touches[0]; hold = setTimeout(()=> startDrag(t.clientX, t.clientY), 120); }
  function onTouchMove(e){ if(!localDrag) return; onPointerMove(e.touches[0]); e.preventDefault(); }
  function onTouchEnd(e){ clearHold(); endDrag(e); }

  sub._subDragHandlers = { handle, onPointerDown, onMouseDown, onTouchStart };

  if(window.PointerEvent){
    handle.addEventListener('pointerdown', onPointerDown);
  } else {
    handle.addEventListener('mousedown', onMouseDown);
    handle.addEventListener('touchstart', onTouchStart, {passive:false});
    handle.addEventListener('touchmove', onTouchMove, {passive:false});
    handle.addEventListener('touchend', onTouchEnd, {passive:true});
  }
}

function disableDragForSubtile(sub){
  if(!sub) return;
  const h = sub._subDragHandlers; if(!h) return;
  try{
    if(window.PointerEvent){
      h.handle.removeEventListener('pointerdown', h.onPointerDown);
    } else {
      h.handle.removeEventListener('mousedown', h.onMouseDown);
      h.handle.removeEventListener('touchstart', h.onTouchStart);
    }
  }catch(e){}
  // restore touchAction to default so scroll works
  try{ const handle = sub.querySelector('.tile-button') || sub; if(handle) handle.style.touchAction = ''; }catch(e){}
  sub._subDragHandlers = null;
}

/* Возвращает индекс плитки в потоке */
function getFlowIndex(tile){
  const list = Array.from(tiles.querySelectorAll('.tile')).filter(n => n !== addTile);
  return list.indexOf(tile);
}

/* rebuild/commit */
function rebuildFromSnapshot(snapshot){
  const existing = Array.from(tiles.querySelectorAll('.tile'));
  existing.forEach(n => { if(n !== addTile) n.remove(); });
  snapshot.forEach(s => { if(s && s.name && s.url) createTile(s.name, s.url, s.icon || ''); else if(s && s.type==='group'){ const g = createGroup(s.name || 'Группа'); setGroupItems(g, s.items || []); renderGroupPreview(g); } });
}

function commitPositionsAndSave(){
  const nodes = Array.from(tiles.querySelectorAll('.tile')).filter(n => n !== addTile);
  const arr = nodes.map(n => { if(n._isGroup) return { type:'group', name: n._groupName || '', items: (getGroupItems(n)||[]).map(it=>({ name: it.name, url: it.url, icon: it.icon })) }; else return ({ type:'tile', name: n.querySelector('.tile-label')?.textContent || '', url: n._url || '', icon: n._icon || '' }); });
  // очищаем и воссоздаём по порядку
  const existing = Array.from(tiles.querySelectorAll('.tile'));
  existing.forEach(n => { if(n !== addTile) n.remove(); });
  arr.forEach(item => { if(item.type==='tile') createTile(item.name, item.url, item.icon || ''); else if(item.type==='group'){ const g = createGroup(item.name); setGroupItems(g, item.items || []); renderGroupPreview(g); } });
  saveAll();
}

/* move-controls */
function createMoveControls(){
  if(moveControls) return;
  moveControls = document.createElement('div');
  moveControls.className = 'move-controls';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn cancel';
  cancelBtn.textContent = 'Отмена';
  cancelBtn.addEventListener('click', ()=>{ exitMoveMode(false); });

  const okBtnLocal = document.createElement('button');
  okBtnLocal.className = 'btn ok';
  okBtnLocal.textContent = 'ОК';
  okBtnLocal.addEventListener('click', ()=>{ exitMoveMode(true); });

  // NEW: delete all button for main move mode
  const deleteAllBtnMain = document.createElement('button');
  deleteAllBtnMain.className = 'btn cancel';
  deleteAllBtnMain.textContent = 'Удалить все';
  deleteAllBtnMain.title = 'Удалить все ярлыки на странице (до подтверждения ОК можно отменить)';
  deleteAllBtnMain.addEventListener('click', ()=>{
    if(!confirm('Удалить все ярлыки на странице? (Изменение можно отменить кнопкой "Отмена")')) return;
    // record deleted items for potential restore/cancellation
    const nodes = Array.from(tiles.querySelectorAll('.tile')).filter(n => n !== addTile);
    // store full snapshot in deletedDuringMove for UI trace (not strictly required because rebuildFromSnapshot uses snapshotBeforeMove)
    deletedDuringMove = nodes.map((n, idx) => ({ name: n.querySelector('.tile-label')?.textContent || '', url: n._url || '', index: getFlowIndex(n) }));
    // remove tiles from DOM
    nodes.forEach(n => n.remove());
    buildFlowOrder();
    updateFlowPositions(true);
  });

  // Note: removed global "Удалить все" from main move controls to avoid accidental destructive action
  moveControls.appendChild(cancelBtn);
  moveControls.appendChild(okBtnLocal);
  // append delete all to the right of OK as requested
  moveControls.appendChild(deleteAllBtnMain);

  document.body.appendChild(moveControls);
  moveControls.style.display = 'flex';
}

function destroyMoveControls(){
  if(!moveControls) return;
  moveControls.remove();
  moveControls = null;
}

/* ===== Group move mode implementation ===== */
function takeGroupSnapshot(group){
  if(!group) return null;
  return (Array.isArray(getGroupItems(group)) ? getGroupItems(group).map(it => Object.assign({}, it)) : []);
}
function createGroupMoveControls(){
  if(groupMoveControls) return;
  groupMoveControls = document.createElement('div'); groupMoveControls.className = 'move-controls';
  const cancelBtn = document.createElement('button'); cancelBtn.className = 'btn cancel'; cancelBtn.textContent = 'Отмена'; cancelBtn.addEventListener('click', ()=>{ exitGroupMoveMode(false); });
  const okBtnLocal = document.createElement('button'); okBtnLocal.className = 'btn ok'; okBtnLocal.textContent = 'ОК'; okBtnLocal.addEventListener('click', ()=>{ exitGroupMoveMode(true); });
  // delete all for group (temporary, until commit)
  const deleteAllBtn = document.createElement('button'); deleteAllBtn.className = 'btn cancel'; deleteAllBtn.textContent = 'Удалить все'; deleteAllBtn.title = 'Удалить все элементы группы (временно, можно отменить)';
  deleteAllBtn.addEventListener('click', ()=>{
    if(!groupMoveTarget) return;
    if(!confirm('Удалить все элементы в группе? (Изменение будет применено только после нажатия ОК)')) return;
    // record deleted items for possible restore
    const grid = groupPopupNode && groupPopupNode.querySelector('.grid');
    // capture existing children as deleted snapshot for possible undo
    if(grid){
      const children = Array.from(grid.children);
      groupMoveDeleted = children.map((ch, idx) => ({ index: idx, meta: ch._meta ? Object.assign({}, ch._meta) : null }));
      // remove children from DOM
      children.forEach(c => c.remove());
    } else {
      // popup not open — still record current items
      const items = Array.isArray(getGroupItems(groupMoveTarget)) ? getGroupItems(groupMoveTarget).slice() : [];
      groupMoveDeleted = items.map((it, idx) => ({ index: idx, meta: it ? Object.assign({}, it) : null }));
    }
    // Clear group's dataset and internal container immediately (temporary until commit)
    try{
      setGroupItems(groupMoveTarget, []);
      if(groupMoveTarget._container){
        while(groupMoveTarget._container.firstChild) groupMoveTarget._container.removeChild(groupMoveTarget._container.firstChild);
      }
      // update preview & popup (temporary)
      renderGroupPreview(groupMoveTarget);
      if(groupPopupNode){
        renderGroupPopupContent(groupMoveTarget);
      }
    }catch(e){
      console.error('group deleteAll error', e);
      alert('Ошибка при удалении всех элементов группы: ' + (e && e.message ? e.message : 'ошибка'));
    }
  });

  groupMoveControls.appendChild(cancelBtn);
  groupMoveControls.appendChild(deleteAllBtn);
  groupMoveControls.appendChild(okBtnLocal);

  // If popup open, attach controls under popup (outside), so they are visible and don't scroll.
  if(groupPopupNode){
    // hide internal close button inside popup while move controls are visible
    try{
      const internalClose = groupPopupNode.querySelector('.popup-close');
      if(internalClose) internalClose.style.display = 'none';
    }catch(e){}

    groupMoveControls.style.position = 'fixed';
    groupMoveControls.style.zIndex = 2200;
    groupMoveControls.style.display = 'flex';
    document.body.appendChild(groupMoveControls);

    // position under popup
    function reposition(){
      if(!groupPopupNode || !groupMoveControls) return;
      const rect = groupPopupNode.getBoundingClientRect();
      const left = Math.max(8, rect.left + 12);
      const top = Math.min(window.innerHeight - 8, rect.bottom + 12);
      groupMoveControls.style.left = left + 'px';
      groupMoveControls.style.top = top + 'px';
      // if external close exists, reposition it to be right of controls
      if(externalGroupCloseBtn && externalGroupCloseRepositionHandler) externalGroupCloseRepositionHandler();
    }
    reposition();
    groupMoveControlsRepositionHandler = reposition;
    window.addEventListener('resize', groupMoveControlsRepositionHandler);
    window.addEventListener('scroll', groupMoveControlsRepositionHandler, {passive:true});
  } else {
    // fallback to body (should not happen in normal flow)
    document.body.appendChild(groupMoveControls);
    groupMoveControls.style.display = 'flex';
  }
}
function destroyGroupMoveControls(){ if(!groupMoveControls) return; try{
    // restore internal close if existed
    if(groupPopupNode){
      const internalClose = groupPopupNode.querySelector('.popup-close');
      if(internalClose) internalClose.style.display = '';
    }
    groupMoveControls.remove();
    groupMoveControls = null;
    if(groupMoveControlsRepositionHandler){
